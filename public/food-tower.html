<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Food Tower | Eren Sezer</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* Architectural wireframe style */
    .wireframe-box {
      position: absolute;
      border: 1px solid #282420;
      opacity: 0.12;
    }
    .wireframe-box-1 { width: 120px; height: 220px; bottom: 30px; left: 38%; transform: perspective(400px) rotateY(-15deg); }
    .wireframe-box-2 { width: 80px;  height: 160px; bottom: 30px; left: 45%; transform: perspective(400px) rotateY(-15deg); }
    .wireframe-box-3 { width: 60px;  height: 120px; bottom: 30px; left: 50%; transform: perspective(400px) rotateY(-15deg); }
    .wireframe-line {
      position: absolute;
      background: #282420;
      opacity: 0.08;
    }
    .canvas-placeholder { background: #f8f6f3; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <div class="nav-inner">
      <a href="/" class="nav-logo">eren sezer</a>
      <ul class="nav-links">
        <li><a href="/projects" class="active">projects</a></li>
        <li><a href="/about">about</a></li>
        <li><a href="/awards">awards</a></li>
        <li><a href="/publications">publications</a></li>
        <li><a href="/contact">contact</a></li>
      </ul>
    </div>
  </header>

  <main>
    <div class="project-content">

      <a href="/projects" class="back-link">← projects</a>

      <h1 class="project-title">food tower</h1>

      <!-- Architectural Wireframe placeholder -->
      <div class="canvas-placeholder" style="margin-bottom: 64px;">
        <!-- Decorative wireframe lines -->
        <svg width="100%" height="100%" viewBox="0 0 900 390" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;opacity:0.18;">
          <!-- Vertical tower forms -->
          <rect x="320" y="60"  width="60"  height="280" fill="none" stroke="#282420" stroke-width="0.8"/>
          <rect x="395" y="100" width="80"  height="240" fill="none" stroke="#282420" stroke-width="0.8"/>
          <rect x="490" y="130" width="55"  height="210" fill="none" stroke="#282420" stroke-width="0.8"/>
          <rect x="560" y="80"  width="70"  height="260" fill="none" stroke="#282420" stroke-width="0.8"/>
          <!-- Floor plates -->
          <line x1="300" y1="160" x2="650" y2="160" stroke="#282420" stroke-width="0.5"/>
          <line x1="300" y1="200" x2="650" y2="200" stroke="#282420" stroke-width="0.5"/>
          <line x1="300" y1="240" x2="650" y2="240" stroke="#282420" stroke-width="0.5"/>
          <line x1="300" y1="280" x2="650" y2="280" stroke="#282420" stroke-width="0.5"/>
          <!-- Ground line -->
          <line x1="200" y1="340" x2="720" y2="340" stroke="#282420" stroke-width="1.0"/>
          <!-- Diagonal structural lines -->
          <line x1="320" y1="60"  x2="395" y2="100" stroke="#282420" stroke-width="0.4"/>
          <line x1="380" y1="60"  x2="475" y2="100" stroke="#282420" stroke-width="0.4"/>
          <line x1="490" y1="130" x2="560" y2="80"  stroke="#282420" stroke-width="0.4"/>
          <line x1="545" y1="130" x2="630" y2="80"  stroke="#282420" stroke-width="0.4"/>
          <!-- Perspective lines -->
          <line x1="450" y1="20" x2="320" y2="340" stroke="#282420" stroke-width="0.3"/>
          <line x1="450" y1="20" x2="630" y2="340" stroke="#282420" stroke-width="0.3"/>
        </svg>
        <span class="wireframe-label">architectural wireframe — food tower</span>
      </div>

      <p class="coming-soon">Project content coming soon.</p>

      <div class="project-footer-nav">
        <a href="/projects">← all projects</a>
        <a href="/contact">get in touch →</a>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-copy">© 2026 Eren Sezer</p>
      <nav class="footer-nav">
        <a href="/projects">projects</a>
        <a href="/about">about</a>
        <a href="/awards">awards</a>
        <a href="/publications">publications</a>
        <a href="/contact">contact</a>
      </nav>
    </div>
  </footer>

</body>
</html>
