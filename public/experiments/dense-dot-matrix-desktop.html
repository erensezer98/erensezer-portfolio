<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabletop Scanner</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0e12; font-family: Arial, sans-serif; color: white; }
    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(10, 14, 18, 0.92); backdrop-filter: blur(10px); z-index: 20; transition: opacity 0.9s ease;
    }
    #qr-code { border: 10px solid white; border-radius: 8px; background: white; margin-bottom: 18px; }
    #status-text { color: rgba(255, 255, 255, 0.58); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6; text-align: center; }
    .hidden { opacity: 0; pointer-events: none; }
    #info {
      position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none;
      text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: rgba(255,255,255,0.74);
    }
    #legend {
      position: absolute; right: 20px; bottom: 20px; z-index: 10; padding: 14px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px);
      max-width: 220px; font-size: 11px; line-height: 1.55; color: rgba(255,255,255,0.7);
    }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js" crossorigin="anonymous"></script>
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.154.0/build/three.module.js" } }
  </script>
</head>
<body>
  <div id="overlay">
    <canvas id="qr-code"></canvas>
    <div id="status-text">Generating connection...</div>
  </div>

  <div id="info">
    Tabletop Scanner / Desk City<br>
    <span style="font-size: 10px; color: #88929b;">Point your phone at a desk to grow a miniature city</span>
  </div>

  <div id="legend">
    Objects become city pieces.<br>
    Books stretch into slabs, cups rise into towers, bottles become spires, and small tools turn into urban fragments.
  </div>

  <script type="module">
    import * as THREE from 'three'

    const objectPalette = {
      book: { color: '#ff8b5c', height: 1.6, footprint: 1.8 },
      laptop: { color: '#8df0ff', height: 1.2, footprint: 2.2 },
      cup: { color: '#ffd86e', height: 2.9, footprint: 0.8 },
      bottle: { color: '#d18cff', height: 3.6, footprint: 0.7 },
      phone: { color: '#6effb0', height: 1.0, footprint: 1.2 },
      keyboard: { color: '#9eb7ff', height: 0.8, footprint: 2.4 },
      mouse: { color: '#ff95ba', height: 0.9, footprint: 0.8 },
      remote: { color: '#c6ffa4', height: 1.0, footprint: 1.1 },
      scissors: { color: '#ff6e6e', height: 1.3, footprint: 0.9 },
      pen: { color: '#f4a3ff', height: 0.7, footprint: 1.7 },
      default: { color: '#ffffff', height: 1.4, footprint: 1.1 },
    }

    const detections = []
    let lastDataTime = 0

    function pickStyle(label) {
      const key = Object.keys(objectPalette).find((entry) => label.includes(entry))
      return objectPalette[key || 'default']
    }

    const peer = new window.Peer()

    peer.on('open', (id) => {
      const mobileUrl = `${window.location.origin}/experiments/dense-dot-matrix-mobile.html?room=${encodeURIComponent(id)}`

      new window.QRious({
        element: document.getElementById('qr-code'),
        value: mobileUrl,
        size: 220,
        background: '#ffffff',
        foreground: '#000000',
      })

      document.getElementById('status-text').innerText =
        '1. Scan with your phone\n2. Open the camera page\n3. Point it at a tabletop scene'
    })

    peer.on('connection', (conn) => {
      document.getElementById('status-text').innerText = 'Secure link established\nReceiving object detections...'
      document.getElementById('qr-code').style.display = 'none'

      setTimeout(() => {
        document.getElementById('overlay').classList.add('hidden')
      }, 1200)

      conn.on('data', (payload) => {
        if (!payload || !Array.isArray(payload.objects)) return
        lastDataTime = Date.now()
        detections.length = 0
        payload.objects.slice(0, 12).forEach((item) => detections.push(item))
      })
    })

    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0a0e12)
    scene.fog = new THREE.FogExp2(0x0a0e12, 0.045)

    const camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(0, 14, 18)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    document.body.appendChild(renderer.domElement)

    const ambient = new THREE.AmbientLight(0xffffff, 0.65)
    scene.add(ambient)

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3)
    dirLight.position.set(10, 18, 6)
    scene.add(dirLight)

    const grid = new THREE.GridHelper(36, 28, 0x223241, 0x16202a)
    grid.position.y = -0.01
    scene.add(grid)

    const basePlane = new THREE.Mesh(
      new THREE.CircleGeometry(18, 96),
      new THREE.MeshStandardMaterial({ color: 0x101820, roughness: 0.92, metalness: 0.04 })
    )
    basePlane.rotation.x = -Math.PI / 2
    scene.add(basePlane)

    const cityGroup = new THREE.Group()
    scene.add(cityGroup)

    const roadsGroup = new THREE.Group()
    scene.add(roadsGroup)

    const labelCanvas = document.createElement('canvas')
    labelCanvas.width = 1024
    labelCanvas.height = 512
    const labelCtx = labelCanvas.getContext('2d')
    const labelTexture = new THREE.CanvasTexture(labelCanvas)
    const labelPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 6),
      new THREE.MeshBasicMaterial({ map: labelTexture, transparent: true, depthWrite: false })
    )
    labelPlane.position.set(0, 7.5, -8)
    scene.add(labelPlane)

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop()
        child.geometry?.dispose?.()
        child.material?.dispose?.()
      }
    }

    function renderLabels(items) {
      labelCtx.clearRect(0, 0, labelCanvas.width, labelCanvas.height)
      labelCtx.fillStyle = 'rgba(7, 10, 14, 0.0)'
      labelCtx.fillRect(0, 0, labelCanvas.width, labelCanvas.height)
      labelCtx.fillStyle = 'rgba(255,255,255,0.92)'
      labelCtx.font = '28px Arial'
      items.slice(0, 6).forEach((item, index) => {
        const y = 64 + index * 64
        labelCtx.fillStyle = item.color
        labelCtx.fillRect(40, y - 20, 24, 24)
        labelCtx.fillStyle = 'rgba(255,255,255,0.88)'
        labelCtx.fillText(`${item.label}  ${Math.round(item.score * 100)}%`, 88, y)
      })
      labelTexture.needsUpdate = true
    }

    function buildCity(items, time) {
      clearGroup(cityGroup)
      clearGroup(roadsGroup)

      const mapped = items.map((item) => {
        const style = pickStyle(item.label)
        const centerX = (item.x + item.width * 0.5 - 0.5) * 24
        const centerZ = (item.y + item.height * 0.5 - 0.5) * 14
        const width = Math.max(style.footprint, item.width * 16)
        const depth = Math.max(style.footprint, item.height * 11)
        const height = style.height + item.score * 2.2 + Math.sin(time * 1.6 + centerX * 0.15 + centerZ * 0.18) * 0.18
        return { ...item, color: style.color, centerX, centerZ, width, depth, height }
      })

      mapped.forEach((item) => {
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(item.color),
          roughness: 0.35,
          metalness: 0.18,
          emissive: new THREE.Color(item.color).multiplyScalar(0.16),
        })
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(item.width, item.height, item.depth),
          material
        )
        mesh.position.set(item.centerX, item.height / 2, item.centerZ)
        cityGroup.add(mesh)

        const cap = new THREE.Mesh(
          new THREE.CylinderGeometry(item.width * 0.16, item.width * 0.28, 0.24, 24),
          new THREE.MeshStandardMaterial({
            color: 0xf8efe2,
            emissive: new THREE.Color(item.color).multiplyScalar(0.3),
            roughness: 0.18,
            metalness: 0.45,
          })
        )
        cap.position.set(item.centerX, item.height + 0.12, item.centerZ)
        cityGroup.add(cap)
      })

      for (let i = 0; i < mapped.length; i += 1) {
        const a = mapped[i]
        const b = mapped[(i + 1) % mapped.length]
        if (!a || !b) continue
        const start = new THREE.Vector3(a.centerX, 0.03, a.centerZ)
        const end = new THREE.Vector3(b.centerX, 0.03, b.centerZ)
        const distance = start.distanceTo(end)
        if (distance < 1.4 || distance > 16) continue
        const road = new THREE.Mesh(
          new THREE.BoxGeometry(distance, 0.05, 0.24),
          new THREE.MeshBasicMaterial({ color: 0x6de3ff, transparent: true, opacity: 0.42 })
        )
        road.position.copy(start.clone().lerp(end, 0.5))
        road.lookAt(end)
        road.rotateY(Math.PI / 2)
        roadsGroup.add(road)
      }

      renderLabels(mapped)
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    const clock = new THREE.Clock()

    function animate() {
      requestAnimationFrame(animate)
      const time = clock.getElapsedTime()

      const activeItems = Date.now() - lastDataTime < 2400 ? detections : []
      buildCity(activeItems, time)

      cityGroup.rotation.y = Math.sin(time * 0.22) * 0.18
      roadsGroup.rotation.y = cityGroup.rotation.y
      camera.position.x = Math.sin(time * 0.12) * 1.6
      camera.position.z = 18 + Math.cos(time * 0.1) * 0.8
      camera.lookAt(0, 2.8, 0)

      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
