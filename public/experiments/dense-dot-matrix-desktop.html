<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dense Dot Matrix</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #030408; font-family: Arial, sans-serif; color: white; }
    #info { position: absolute; top: 20px; left: 20px; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; z-index: 10; opacity: 0.7; }
    #overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 4, 8, 0.9); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 100; backdrop-filter: blur(10px); transition: opacity 1.5s ease; }
    #qr-code { border: 10px solid white; border-radius: 8px; margin-bottom: 20px; background: white; }
    .hidden { opacity: 0; pointer-events: none; }
    #status-text { margin-top: 16px; color: rgba(255, 255, 255, 0.5); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; text-align: center; line-height: 1.5;}
  </style>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js" crossorigin="anonymous"></script>
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.154.0/build/three.module.js" } }
  </script>
</head>
<body>
  <div id="overlay">
    <canvas id="qr-code"></canvas>
    <div id="status-text">Generating connection...</div>
  </div>

  <div id="info">
    Dense Dot Matrix / Silhouette Field<br>
    <span style="font-size: 10px; color: #888;">A living point cloud shaped by the body in motion</span>
  </div>

  <script type="module">
    import * as THREE from 'three'

    const POSE_CONNECTIONS = [
      [11, 12], [11, 13], [13, 15], [15, 17], [15, 19], [15, 21],
      [12, 14], [14, 16], [16, 18], [16, 20], [16, 22],
      [11, 23], [12, 24], [23, 24],
      [23, 25], [25, 27], [27, 29], [29, 31],
      [24, 26], [26, 28], [28, 30], [30, 32],
      [11, 24], [12, 23], [0, 7], [0, 8],
    ]

    const landmarkUniforms = []
    for (let i = 0; i < 33; i += 1) {
      landmarkUniforms.push(new THREE.Vector2(-100, -100))
    }

    const segmentUniforms = POSE_CONNECTIONS.map(() => new THREE.Vector4(-100, -100, -100, -100))
    let lastDataTime = Date.now()

    function decayLandmarks() {
      landmarkUniforms.forEach((v) => {
        v.x += (-100 - v.x) * 0.05
        v.y += (-100 - v.y) * 0.05
      })
    }

    function updateSegmentUniforms() {
      POSE_CONNECTIONS.forEach(([aIndex, bIndex], index) => {
        const a = landmarkUniforms[aIndex]
        const b = landmarkUniforms[bIndex]
        segmentUniforms[index].set(a.x, a.y, b.x, b.y)
      })
    }

    const peer = new window.Peer()

    peer.on('open', (id) => {
      const mobileUrl = `${window.location.origin}/experiments/dense-dot-matrix-mobile.html?room=${encodeURIComponent(id)}`

      new window.QRious({
        element: document.getElementById('qr-code'),
        value: mobileUrl,
        size: 220,
        background: '#ffffff',
        foreground: '#000000',
      })

      document.getElementById('status-text').innerText =
        '1. Scan with your phone\n2. Open the companion page\n3. Allow camera access to stream telemetry'
    })

    peer.on('connection', (conn) => {
      document.getElementById('status-text').innerText = 'Secure link established\nSyncing telemetry...'
      document.getElementById('qr-code').style.display = 'none'

      setTimeout(() => {
        document.getElementById('overlay').classList.add('hidden')
      }, 1500)

      conn.on('data', (data) => {
        lastDataTime = Date.now()

        if (Array.isArray(data) && data.length === 33) {
          data.forEach((lm, i) => {
            const targetX = (1 - lm.x) * 2 - 1
            const targetY = -(lm.y * 2) + 1
            landmarkUniforms[i].x += (targetX - landmarkUniforms[i].x) * 0.2
            landmarkUniforms[i].y += (targetY - landmarkUniforms[i].y) * 0.2
          })
          updateSegmentUniforms()
        } else if (data && data.empty) {
          decayLandmarks()
          updateSegmentUniforms()
        }
      })
    })

    const scene = new THREE.Scene()
    scene.fog = new THREE.FogExp2(0x030408, 0.025)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(0, 0, 15)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setClearColor(0x030408)
    document.body.appendChild(renderer.domElement)

    const gridWidth = 80
    const gridHeight = 46
    const density = 5

    const countX = Math.floor(gridWidth * density)
    const countY = Math.floor(gridHeight * density)
    const particleCount = countX * countY

    const geometry = new THREE.BufferGeometry()
    const positions = new Float32Array(particleCount * 3)
    const baseSizes = new Float32Array(particleCount)

    let iter = 0
    for (let y = 0; y < countY; y += 1) {
      for (let x = 0; x < countX; x += 1) {
        positions[iter * 3] = (x / countX) * gridWidth - gridWidth / 2
        positions[iter * 3 + 1] = (y / countY) * gridHeight - gridHeight / 2
        positions[iter * 3 + 2] = 0
        baseSizes[iter] = 1 + Math.random() * 1.5
        iter += 1
      }
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3))
    geometry.setAttribute('baseSize', new THREE.BufferAttribute(baseSizes, 1))

    const getVisibleFrustumHeight = () => 2 * 15 * Math.tan(THREE.MathUtils.degToRad(60 / 2))

    const material = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uLandmarks: { value: landmarkUniforms },
        uSegments: { value: segmentUniforms },
        uVisibleWidth: { value: getVisibleFrustumHeight() * camera.aspect },
        uVisibleHeight: { value: getVisibleFrustumHeight() },
        uAspect: { value: camera.aspect },
      },
      vertexShader: `
        uniform float uTime;
        uniform vec2 uLandmarks[33];
        uniform vec4 uSegments[26];
        uniform float uVisibleWidth;
        uniform float uVisibleHeight;
        uniform float uAspect;
        attribute float baseSize;
        varying vec3 vColor;
        varying float vEnergy;

        float sdSegment(vec2 p, vec2 a, vec2 b) {
          vec2 pa = p - a;
          vec2 ba = b - a;
          float denom = max(dot(ba, ba), 0.0001);
          float h = clamp(dot(pa, ba) / denom, 0.0, 1.0);
          return length(pa - ba * h);
        }

        float roundedBoxField(vec2 p, vec2 center, vec2 halfSize, float radius, vec2 axisY) {
          vec2 safeAxisY = normalize(axisY + vec2(0.0001, 0.0001));
          vec2 axisX = vec2(safeAxisY.y, -safeAxisY.x);
          vec2 local = p - center;
          vec2 q = vec2(dot(local, axisX), dot(local, safeAxisY));
          vec2 d = abs(q) - halfSize;
          float outside = length(max(d, 0.0));
          float inside = min(max(d.x, d.y), 0.0);
          float dist = outside + inside;
          return 1.0 - smoothstep(radius, radius + 0.12, dist);
        }

        float circleField(vec2 p, vec2 center, float radius) {
          float d = length(p - center);
          return 1.0 - smoothstep(radius, radius + 0.14, d);
        }

        void main() {
          vec3 pos = position;
          vec2 normalizedPos = vec2(pos.x / (uVisibleWidth / 2.0), pos.y / (uVisibleHeight / 2.0));
          float jointField = 0.0;

          for (int i = 0; i < 33; i++) {
            vec2 diff = normalizedPos - uLandmarks[i];
            diff.x *= uAspect;
            float d = length(diff);
            jointField = max(jointField, 1.0 - smoothstep(0.0, 0.12, d));
          }

          float skeletonField = 0.0;
          for (int i = 0; i < 26; i++) {
            vec2 a = uSegments[i].xy;
            vec2 b = uSegments[i].zw;
            vec2 scaledPos = normalizedPos;
            vec2 scaledA = a;
            vec2 scaledB = b;
            scaledPos.x *= uAspect;
            scaledA.x *= uAspect;
            scaledB.x *= uAspect;
            float d = sdSegment(scaledPos, scaledA, scaledB);
            skeletonField = max(skeletonField, 1.0 - smoothstep(0.0, 0.08, d));
          }

          vec2 shoulderCenter = (uLandmarks[11] + uLandmarks[12]) * 0.5;
          vec2 hipCenter = (uLandmarks[23] + uLandmarks[24]) * 0.5;
          vec2 torsoAxis = shoulderCenter - hipCenter;
          float torsoHeight = max(length(torsoAxis), 0.16) * 0.55;
          float torsoWidth = max(length(uLandmarks[11] - uLandmarks[12]), length(uLandmarks[23] - uLandmarks[24])) * 0.28 + 0.06;
          float torsoField = roundedBoxField(
            normalizedPos,
            (shoulderCenter + hipCenter) * 0.5,
            vec2(torsoWidth, torsoHeight),
            0.04,
            torsoAxis
          );

          vec2 headCenter = mix(uLandmarks[0], shoulderCenter, 0.18);
          float headRadius = max(length(uLandmarks[7] - uLandmarks[8]), 0.08) * 0.9 + 0.05;
          float headField = circleField(normalizedPos, headCenter, headRadius);

          float totalInfluence = max(max(skeletonField, torsoField), max(headField, jointField * 0.75));
          totalInfluence = clamp(totalInfluence, 0.0, 1.0);

          float ripple = sin(pos.x * 0.55 + uTime * 1.8) * cos(pos.y * 0.45 - uTime * 1.35) * 0.28;
          float shimmer = sin((pos.x + pos.y) * 0.35 - uTime * 2.2) * 0.12;
          pos.z += ripple + shimmer;
          pos.z += totalInfluence * 5.0;
          pos.x += sin(pos.y * 0.16 + uTime) * 0.12 * totalInfluence;
          pos.y += cos(pos.x * 0.14 - uTime * 0.85) * 0.12 * totalInfluence;

          vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = baseSize * (18.0 / -mvPosition.z) * (1.25 + totalInfluence * 6.2);
          gl_Position = projectionMatrix * mvPosition;

          float hueMix = 0.5 + 0.5 * sin(uTime * 0.9 + pos.y * 0.08);
          vec3 idleColor = mix(vec3(0.03, 0.05, 0.09), vec3(0.10, 0.07, 0.16), hueMix);
          vec3 contourColor = mix(vec3(0.10, 0.95, 1.0), vec3(1.0, 0.45, 0.22), hueMix);
          vec3 coreColor = vec3(1.0, 0.96, 0.82);

          vec3 finalColor = mix(idleColor, contourColor, clamp(totalInfluence * 1.3, 0.0, 1.0));
          finalColor = mix(finalColor, coreColor, clamp((totalInfluence - 0.55) * 2.4, 0.0, 1.0));
          vColor = finalColor;
          vEnergy = totalInfluence;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vEnergy;

        void main() {
          vec2 coord = gl_PointCoord - vec2(0.5);
          float d = length(coord);
          if (d > 0.5) discard;
          float halo = smoothstep(0.5, 0.0, d);
          float core = smoothstep(0.24, 0.0, d);
          float alpha = mix(0.28, 1.0, vEnergy) * halo;
          vec3 color = vColor + vec3(core * 0.24);
          gl_FragColor = vec4(color, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    })

    scene.add(new THREE.Points(geometry, material))

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
      material.uniforms.uAspect.value = camera.aspect
      material.uniforms.uVisibleWidth.value = getVisibleFrustumHeight() * camera.aspect
      material.uniforms.uVisibleHeight.value = getVisibleFrustumHeight()
    })

    const clock = new THREE.Clock()

    function animate() {
      requestAnimationFrame(animate)
      material.uniforms.uTime.value = clock.getElapsedTime()

      if (Date.now() - lastDataTime > 1500) {
        decayLandmarks()
        updateSegmentUniforms()
      }

      renderer.render(scene, camera)
    }

    updateSegmentUniforms()
    animate()
  </script>
</body>
</html>
