<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop · Spatial Fingerprints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text-primary: #0a0a0a;
      --text-muted: rgba(0,0,0,0.5);
      --border: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #page-header {
      padding: 40px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    #page-header .eyebrow {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    #page-header h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    #header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .action-btn {
      padding: 9px 16px;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.15s;
    }

    #refresh-btn {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
      color: var(--text-primary);
    }
    #refresh-btn:hover { background: rgba(0,0,0,0.04); }

    #export-btn {
      background: #000;
      border: none;
      color: #fff;
    }
    #export-btn:hover { opacity: 0.8; }
    #export-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Grid ───────────────────────────────────────────────────── */
    #gallery {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    @media (max-width: 900px) {
      #gallery { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      #gallery { grid-template-columns: 1fr; }
      #page-header { padding: 24px; }
      #gallery { padding: 24px; }
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .card-image-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-image-wrap .no-img {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-body {
      padding: 16px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .card-scores {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .score-item {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      display: flex;
      justify-content: space-between;
    }

    .score-name {
      text-transform: uppercase;
    }

    .score-pct {
      font-variant-numeric: tabular-nums;
    }

    .card-direction {
      font-size: 11px;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.65;
      border-left: 2px solid rgba(0,0,0,0.08);
      padding-left: 10px;
    }

    /* ── States ─────────────────────────────────────────────────── */
    #loading, #empty {
      grid-column: 1 / -1;
      padding: 80px 0;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #count-label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 16px 40px 0;
    }

    /* ── Delete button ──────────────────────────────────────────── */
    .delete-btn {
      margin-top: 4px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid rgba(255,60,60,0.3);
      color: rgba(200,0,0,0.6);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    .delete-btn:hover { background: rgba(255,0,0,0.06); border-color: rgba(200,0,0,0.5); color: rgba(200,0,0,0.9); }
    .delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Card footer row ────────────────────────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .drive-link {
      font-size: 9px;
      color: rgba(0,0,0,0.35);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .drive-link:hover { color: #007aff; }

    /* ── Image loading shimmer ──────────────────────────────────── */
    .img-loading {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Video Gallery ─────────────────────────────────────────── */
    .gallery-heading {
      padding: 60px 40px 20px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    #video-gallery {
      padding: 0 40px 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media (max-width: 1200px) { #video-gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { #video-gallery { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { 
      #video-gallery { grid-template-columns: 1fr; padding: 0 24px 40px; } 
      .gallery-heading { padding: 40px 24px 16px; }
    }

    .video-card {
      aspect-ratio: 1;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-card .overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .video-card:hover .overlay { opacity: 1; }

  </style>
</head>
<body>

<div id="page-header">
  <div>
    <div class="eyebrow">Workshop</div>
    <h1>Spatial Fingerprints</h1>
  </div>
  <div id="header-actions">
    <button class="action-btn" id="refresh-btn">Refresh</button>
    <button class="action-btn" id="export-btn" disabled>Generate Gallery PNG</button>
  </div>
</div>

<div id="count-label"></div>

<div class="gallery-heading">Static Archive</div>
<div id="gallery">
  <div id="loading">Loading submissions…</div>
</div>

<div class="gallery-heading">Motion Archive</div>
<div id="video-gallery">
  <div id="video-loading" style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 11px; padding: 40px;">Waiting for data…</div>
</div>


<script>
let allSubmissions = [];

// ── Load submissions ─────────────────────────────────────────────────
async function loadSubmissions() {
  const gallery    = document.getElementById('gallery');
  const exportBtn  = document.getElementById('export-btn');
  const countLabel = document.getElementById('count-label');
  gallery.innerHTML = '<div id="loading">Loading submissions…</div>';
  exportBtn.disabled = true;
  countLabel.textContent = '';

  try {
    // Cache-bust so we always get fresh data
    const res = await fetch('/api/submissions/list?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { submissions, error } = await res.json();
    if (error) throw new Error(error);
    allSubmissions = submissions || [];

    gallery.innerHTML = '';
    const videoGallery = document.getElementById('video-gallery');
    videoGallery.innerHTML = '';

    if (allSubmissions.length === 0) {
      gallery.innerHTML = '<div id="empty">No submissions yet</div>';
      videoGallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 11px;">No motion files found</div>';
      return;
    }

    countLabel.textContent = `${allSubmissions.length} submission${allSubmissions.length !== 1 ? 's' : ''}`;
    for (const sub of allSubmissions) {
      gallery.appendChild(buildCard(sub));
      if (sub.blobVideoId) {
        videoGallery.appendChild(buildVideoCard(sub));
      }
    }
    
    if (videoGallery.childNodes.length === 0) {
      videoGallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-size: 11px;">No motion files found</div>';
    }

    exportBtn.disabled = false;
  } catch (e) {
    gallery.innerHTML = `<div id="empty">Error: ${e.message}</div>`;
  }
}

// ── Build video card ─────────────────────────────────────────────────
function buildVideoCard(sub) {
  const card = document.createElement('div');
  card.className = 'video-card';

  const video = document.createElement('video');
  video.src = `/api/submissions/video/${sub.blobVideoId}`;
  video.autoplay = true;
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.textContent = sub.studentName;

  card.append(video, overlay);
  return card;
}


// ── Build card ───────────────────────────────────────────────────────
function buildCard(sub) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.folderId = sub.driveFolderId || '';

  // Image — use our server-side proxy to avoid Drive auth issues
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-image-wrap';

  if (sub.blobImageId) {
    // Shimmer placeholder while loading
    const shimmer = document.createElement('div');
    shimmer.className = 'img-loading';
    imgWrap.appendChild(shimmer);

    const img = document.createElement('img');
    img.alt = sub.studentName;
    img.style.display = 'none';
    img.onload = () => { shimmer.remove(); img.style.display = 'block'; };
    img.onerror = () => { shimmer.remove(); imgWrap.innerHTML = '<div class="no-img">Image unavailable</div>'; };
    img.src = `/api/submissions/image/${sub.blobImageId}`;
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = '<div class="no-img">No image</div>';
  }

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Name + date row
  const headerRow = document.createElement('div');
  headerRow.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;gap:8px;';
  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = sub.studentName;
  const date = document.createElement('div');
  date.style.cssText = 'font-size:9px;color:rgba(0,0,0,0.3);text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;';
  date.textContent = sub.timestamp ? new Date(sub.timestamp).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
  headerRow.append(name, date);
  body.appendChild(headerRow);

  // Top 3 scores
  const top3 = [...(sub.scores || [])].sort((a, b) => b.probability - a.probability).slice(0, 3);
  if (top3.length) {
    const scoresEl = document.createElement('div');
    scoresEl.className = 'card-scores';
    for (const s of top3) {
      const item = document.createElement('div');
      item.className = 'score-item';
      item.innerHTML = `<span class="score-name">${escHtml(s.className)}</span><span class="score-pct">${(s.probability * 100).toFixed(0)}%</span>`;
      scoresEl.appendChild(item);
    }
    body.appendChild(scoresEl);
  }

  // Artistic direction
  const text = sub.artisticDirection || '';
  if (text) {
    const dir = document.createElement('div');
    dir.className = 'card-direction';
    dir.textContent = text;
    body.appendChild(dir);
  }

  // Footer: Drive link + delete
  const footer = document.createElement('div');
  footer.className = 'card-footer';

  if (sub.driveFolderId) {
    const driveLink = document.createElement('a');
    driveLink.className = 'drive-link';
    driveLink.href = `https://drive.google.com/drive/folders/${sub.driveFolderId}`;
    driveLink.target = '_blank';
    driveLink.textContent = 'View on Drive ↗';
    footer.appendChild(driveLink);
  } else {
    footer.appendChild(document.createElement('span'));
  }

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = 'Delete';
  delBtn.onclick = () => deleteSubmission(sub.driveFolderId, card, delBtn);
  footer.appendChild(delBtn);
  body.appendChild(footer);

  card.append(imgWrap, body);
  return card;
}

// ── Delete ───────────────────────────────────────────────────────────
async function deleteSubmission(driveFolderId, cardEl, btn) {
  if (!driveFolderId) return;
  if (!confirm('Delete this submission permanently from Drive?')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    const res = await fetch('/api/submissions/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driveFolderId }),
    });
    if (!res.ok) throw new Error(await res.text());
    cardEl.style.transition = 'opacity 0.3s';
    cardEl.style.opacity = '0';
    setTimeout(() => { cardEl.remove(); updateCount(); }, 300);
  } catch (e) {
    alert('Delete failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

function updateCount() {
  const cards = document.querySelectorAll('.card').length;
  document.getElementById('count-label').textContent = `${cards} submission${cards !== 1 ? 's' : ''}`;
  if (cards === 0) document.getElementById('gallery').innerHTML = '<div id="empty">No submissions yet</div>';
}

function escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Gallery PNG Export ───────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', async () => {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  const COLS = 3, CELL_W = 400, CELL_H = 620, PAD = 32, IMG_SIZE = 360, HEADER_H = 100;
  const rows = Math.ceil(allSubmissions.length / COLS);
  const canvas = document.createElement('canvas');
  canvas.width  = COLS * CELL_W + (COLS + 1) * PAD;
  canvas.height = HEADER_H + rows * (CELL_H + PAD) + PAD;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a0a0a';
  ctx.font = '500 28px Inter, system-ui, sans-serif';
  ctx.fillText('Workshop · Spatial Fingerprints', PAD, 52);

  // Load images via proxy
  const images = await Promise.all(allSubmissions.map(sub => new Promise(resolve => {
    if (!sub.blobImageId) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = `/api/submissions/image/${sub.blobImageId}`;
  })));

  for (let i = 0; i < allSubmissions.length; i++) {
    const sub = allSubmissions[i];
    const col = i % COLS, row = Math.floor(i / COLS);
    const x = PAD + col * (CELL_W + PAD);
    const y = HEADER_H + PAD + row * (CELL_H + PAD);

    ctx.fillStyle = '#fafafa';
    ctx.fillRect(x, y, CELL_W, CELL_H);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, CELL_W, CELL_H);

    const imgX = x + (CELL_W - IMG_SIZE) / 2, imgY = y + 16;
    if (images[i]) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(imgX, imgY, IMG_SIZE, IMG_SIZE);
      
      const img = images[i];
      const ratio = img.width / img.height;
      let drawW, drawH, drawX, drawY;

      if (ratio > 1) { // Wide
        drawW = IMG_SIZE;
        drawH = IMG_SIZE / ratio;
      } else { // Tall or Square
        drawH = IMG_SIZE;
        drawW = IMG_SIZE * ratio;
      }
      
      drawX = imgX + (IMG_SIZE - drawW) / 2;
      drawY = imgY + (IMG_SIZE - drawH) / 2;
      
      ctx.drawImage(img, drawX, drawY, drawW, drawH);
    } else {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(imgX, imgY, IMG_SIZE, IMG_SIZE);
    }

    const textY = y + 16 + IMG_SIZE + 20;
    ctx.fillStyle = '#0a0a0a';
    ctx.font = '500 15px Inter, system-ui, sans-serif';
    ctx.fillText(sub.studentName, x + 16, textY);

    const top3 = [...(sub.scores||[])].sort((a,b)=>b.probability-a.probability).slice(0,3);
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    top3.forEach((s, si) => ctx.fillText(`${s.className.toUpperCase()}  ${(s.probability*100).toFixed(0)}%`, x + 20, textY + 24 + si * 18));

    // Artistic Direction (wrapped text)
    if (sub.artisticDirection) {
      ctx.font = 'italic 12px Inter, system-ui, sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      const words = sub.artisticDirection.split(' ');
      let line = '';
      let lineCount = 0;
      const maxWidth = CELL_W - 40;
      const startY = textY + 80;

      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
          ctx.fillText(line, x + 20, startY + lineCount * 18);
          line = words[n] + ' ';
          lineCount++;
        } else {
          line = testLine;
        }
        if (lineCount >= 4) break; // Limit to 4 lines to avoid overflow
      }
      ctx.fillText(line, x + 20, startY + lineCount * 18);
    }
  }

  const link = document.createElement('a');
  link.download = 'spatial-fingerprints-gallery.png';
  link.href = canvas.toDataURL('image/png', 1.0);
  link.click();

  btn.textContent = 'Generate Gallery PNG';
  btn.disabled = false;
});

document.getElementById('refresh-btn').addEventListener('click', loadSubmissions);
loadSubmissions();
</script>
</body>
</html>
