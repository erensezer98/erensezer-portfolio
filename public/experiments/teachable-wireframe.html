<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Factor — AI Artistic Direction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-w: 320px;
      --bg: #ffffff;
      --surface: rgba(255, 255, 255, 0.94);
      --border: rgba(0,0,0,0.08);
      --accent: #0077ff;
      --text-primary: #0a0a0a;
      --text-muted: rgba(0,0,0,0.5);
      --text-dim: rgba(0,0,0,0.2);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Canvas ─────────────────────────────────────────────── */
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ─── Left Panel ─────────────────────────────────────────── */
    #panel {
      position: relative;
      z-index: 10;
      width: var(--panel-w);
      min-width: var(--panel-w);
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(120%);
      border-right: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 10px 0 30px rgba(0,0,0,0.02);
    }

    /* Panel Header */
    #panel-header {
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #panel-header .eyebrow {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #panel-header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    /* Scrollable body of panel */
    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Image Upload ─────────────────────────────────────────*/
    #drop-zone {
      border: 1px dashed var(--border);
      border-radius: 8px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    #drop-zone:hover { border-color: var(--accent); background: rgba(0,0,0,0.02); }
    #drop-zone.has-image { border-color: var(--border); }
    #drop-zone-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }
    #drop-zone svg { opacity: 0.4; pointer-events: none; stroke: #000; }
    #preview-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #image-upload { display: none; }

    /* Analyse button */
    #analyse-btn {
      width: 100%;
      padding: 12px;
      background: #000;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    #analyse-btn:hover:not(:disabled) { opacity: 0.8; }
    #analyse-btn:disabled { opacity: 0.15; cursor: not-allowed; }

    /* ─── Status line ─────────────────────────────────────────*/
    #status {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
      min-height: 32px;
      flex-shrink: 0;
    }
    #status.active { color: var(--text-primary); }
    #status.error { color: #ff4444; }

    /* ─── Classification bars ─────────────────────────────────*/
    #classifications {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .cls-row { display: flex; flex-direction: column; gap: 6px; }
    .cls-top { display: flex; justify-content: space-between; align-items: baseline; }
    .cls-name { font-size: 11px; color: var(--text-primary); letter-spacing: 0.05e; text-transform: uppercase; }
    .cls-pct { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .cls-track {
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,0.05);
      border-radius: 1px;
      overflow: hidden;
    }
    .cls-fill {
      height: 100%;
      width: 0%;
      border-radius: 1px;
      transition: width 0.6s cubic-bezier(0.2, 1, 0.3, 1), background 0.6s;
      background: #ddd;
    }
    .cls-fill.dominant { background: #000; }

    /* ─── Divider ─────────────────────────────────────────────*/
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ─── LLM Feedback ────────────────────────────────────────*/
    #llm-section { flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }

    #llm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #llm-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }

    #llm-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #000;
      color: #000;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      border-radius: 4px;
    }
    #llm-btn:hover:not(:disabled) { background: #000; color: #fff; }
    #llm-btn:disabled { opacity: 0.15; }

    /* Feedback box */
    #llm-feedback {
      font-size: 13px;
      line-height: 1.65;
      color: #222;
      min-height: 48px;
      border-left: 2px solid #000;
      padding-left: 14px;
    }

    /* ─── Scrollbar ───────────────────────────────────────────*/
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    /* ─── Wireframe active dims indicator (top-right) ─────────*/
    #live-dims {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      pointer-events: none;
    }
    .dim-chip {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.4s, color 0.4s;
    }
    .dim-chip.active { opacity: 1; color: #000; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<!-- ── Left Panel ──────────────────────────────────────────────────── -->
<div id="panel">
  <div id="panel-header">
    <div class="eyebrow">Experiment · AI Form Factor</div>
    <h1>Artistic Direction Engine</h1>
  </div>

  <div id="panel-body">

    <!-- Image -->
    <div id="drop-zone" onclick="document.getElementById('image-upload').click()" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span id="drop-zone-label">Upload image<br>to begin</span>
      <img id="preview-image" crossorigin="anonymous" alt="Preview" />
    </div>
    <input type="file" id="image-upload" style="display:none" accept="image/*">

    <button id="analyse-btn" disabled>Analyse Image</button>

    <!-- Status -->
    <div id="status">Connecting to AI engine…</div>

    <!-- Classifications -->
    <div id="classifications"></div>

    <div class="divider" id="llm-divider" style="display:none"></div>

    <!-- LLM Artistic Direction -->
    <div id="llm-section" style="display:none">
      <div id="llm-header">
        <span id="llm-title">Artistic Direction · LLM</span>
      </div>

      <div id="llm-feedback">Analysis results will appear here after classification.</div>
      <button id="llm-btn" disabled>Generate Artistic Direction</button>
      <button id="download-btn" style="display: none; width: 100%; padding: 12px; background: #0081ff; color: #fff; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; border-radius: 4px; margin-top: 12px;">Download Submission</button>
    </div>

  </div><!-- /panel-body -->
</div><!-- /panel -->

<!-- ── Live Dimension Chips ────────────────────────────────────────── -->
<div id="live-dims">
  <div class="dim-chip" id="chip-0">—</div>
  <div class="dim-chip" id="chip-1">—</div>
  <div class="dim-chip" id="chip-2">—</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  THREE.JS — Architectural Membrane + Particle Field
// ═══════════════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 32);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.domElement.id = 'three-canvas';
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTING (Optimized for White) ──────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

const accentLight = new THREE.PointLight(0x0077ff, 0.5);
accentLight.position.set(-20, -10, 10);
scene.add(accentLight);

// ── FLUIDIC CORE (THE WATER DROP) ────────────────────────────────────
const fluidGeo = new THREE.IcosahedronGeometry(6, 12);
const fluidBasePos = new Float32Array(fluidGeo.attributes.position.array);

const fluidMat = new THREE.MeshPhongMaterial({
  color: 0x222222,
  specular: 0x444444,
  shininess: 120,
  transparent: true,
  opacity: 0.15,
  wireframe: true,        
});

const fluidMesh = new THREE.Mesh(fluidGeo, fluidMat);
scene.add(fluidMesh);

// ── INNER CORE (FOR VOLUME) ──────────────────────────────────────────
const coreGeo = new THREE.IcosahedronGeometry(3, 8);
const coreMat = new THREE.MeshPhongMaterial({ 
  color: 0x0077ff, 
  transparent: true, 
  opacity: 0.05, 
  wireframe: true 
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);

// ── VORTEX TRAILS (REPRESENTING TRACES/CONTINUITY) ─────────────────────
const RIBS_COUNT = 15;
const ribs = [];
const ribMat = new THREE.LineBasicMaterial({ 
  color: 0x333333, 
  transparent: true, 
  opacity: 0, 
  blending: THREE.NormalBlending 
});

for (let i = 0; i < RIBS_COUNT; i++) {
  const curve = new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3((Math.random() - 0.5) * 15, 5, (Math.random() - 0.5) * 5),
    new THREE.Vector3(5, 10, 5),
    new THREE.Vector3(10, 10, 10)
  );
  const points = curve.getPoints(50);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geometry, ribMat.clone());
  scene.add(line);
  ribs.push({ line, phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.4 });
}

// ── NOISE HELPER ─────────────────────────────────────────────────────
function noiseLayers(x, y, z, time) {
  return Math.sin(x * 0.3 - time) * 0.5 + Math.cos(y * 0.3 + time * 0.7) * 0.5;
}

// ── ATMOSPHERIC MIST (PARTICLES) ─────────────────────────────────────
const PARTICLE_COUNT = 600;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PARTICLE_COUNT * 3);
const pBase = new Float32Array(PARTICLE_COUNT * 3);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  pBase[i * 3] = (Math.random() - 0.5) * 45;
  pBase[i * 3 + 1] = (Math.random() - 0.5) * 45;
  pBase[i * 3 + 2] = (Math.random() - 0.5) * 30;
  pPos[i * 3] = pBase[i * 3];
  pPos[i * 3 + 1] = pBase[i * 3 + 1];
  pPos[i * 3 + 2] = pBase[i * 3 + 2];
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x000000,
  size: 0.08,
  transparent: true,
  opacity: 0.1,
  blending: THREE.NormalBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── TARGET PARAMS (driven by AI) ─────────────────────────────────────
const target = {
  fluidDistortion: 0.1,    
  fluidTurbulence: 0.05,   
  fluidFlow: 0.0,         
  fluidDepth: 0.0,          
  fluidCirculation: 0.0,    
  fluidLife: 0.0,           
  fluidIridescence: 0.0,    // NEW
  coreScale: 0.5,           // NEW
  fluidWireframe: 1.0,     
  fluidTransmission: 0.5,  
  fluidScale: 1.0,         
  ribOpacity: 0.05,        
  ribSpeed: 0.4,
  particleSpread: 1.0,
  colorR: 0.1, colorG: 0.1, colorB: 0.1,
  rotationY: 0.001,
  cameraZ: 28,
};
const current = { ...target };
const lp = 0.04; // lerp factor

// ── ANIMATION LOOP ────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;

  for (const k of Object.keys(target)) {
    current[k] = lerp(current[k], target[k], lp);
  }

  // Heartbeat (DNA) - Define before use
  const lifePulse = current.fluidLife > 0.5 ? Math.pow(Math.sin(t * 4), 10) * current.fluidLife * 0.15 : 0;

  // Camera
  camera.position.z = lerp(camera.position.z, current.cameraZ, 0.01);

  // Colors & Materials
  const col = new THREE.Color(current.colorR, current.colorG, current.colorB);
  fluidMat.color.copy(col);
  fluidMat.opacity = 0.15 + current.fluidTransmission * 0.1;
  
  // Iridescence (Light)
  const spec = new THREE.Color(0x444444).lerp(new THREE.Color(0xffffff), current.fluidIridescence);
  fluidMat.specular.copy(spec);

  // Inner Core (Volume)
  coreMesh.scale.setScalar(current.coreScale + lifePulse * 0.2);
  coreMesh.material.opacity = 0.05 + current.fluidDepth * 0.15;

  particleMat.color.set(0x000000); // Black particles for white bg

  // ── CHARACTER-DRIVEN MORPHING ──
  const fPos = fluidGeo.attributes.position;
  
  for (let i = 0; i < fPos.count; i++) {
    const bx = fluidBasePos[i * 3];
    const by = fluidBasePos[i * 3 + 1];
    const bz = fluidBasePos[i * 3 + 2];
    
    // 1. Turbulence (Intensity / Rhythm)
    const turbulence = Math.sin(bx * 0.8 + t * 1.5) * Math.cos(by * 0.8 + t * 1.2) * Math.sin(bz * 0.8 + t * 0.9);
    
    // 2. Elongation (Flow / Circulation)
    const stretch = 1 + Math.abs(bx + by) * current.fluidFlow * 0.18;
    
    // 3. Calm (Stability)
    const calm = Math.sin(t * 0.4 + bz * 0.2) * 0.5;

    // 4. Depth (Interior volume expansion)
    const depthExp = 1 + (Math.sin(t * 0.2 + bx * 0.1) * current.fluidDepth * 0.3);

    const totalDist = (1 + lifePulse) * (1 + 
      (turbulence * current.fluidTurbulence) + 
      (calm * (1 - current.fluidTurbulence * 0.5)) +
      (Math.sin(bx * 0.3 - t) * 0.5 * current.fluidDistortion)) * depthExp;
    
    fPos.array[i * 3] = bx * totalDist * current.fluidScale * stretch;
    fPos.array[i * 3 + 1] = by * totalDist * current.fluidScale * (1/stretch);
    fPos.array[i * 3 + 2] = bz * totalDist * current.fluidScale;
  }
  fPos.needsUpdate = true;
  fluidMesh.rotation.y += current.rotationY;
  fluidMesh.rotation.z += current.fluidCirculation * 0.02;

  // Ribbons (Traces)
  ribs.forEach((r, i) => {
    r.line.material.color.copy(col);
    r.line.material.opacity = current.ribOpacity * (0.1 + i * 0.1);
    r.line.rotation.y = t * current.ribSpeed + r.phase;
    r.line.rotation.z = Math.sin(t * 0.2 + r.phase) * 0.5;
    const scale = 1 + Math.sin(t * 0.5 + r.phase) * 0.2;
    r.line.scale.set(scale, scale, scale);
  });

  // Mist
  particleMat.opacity = 0.15 + current.ribOpacity * 0.4;
  const pp = particleGeo.attributes.position;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ox = pBase[i * 3];
    const oy = pBase[i * 3 + 1];
    const oz = pBase[i * 3 + 2];
    pp.array[i * 3] = ox * current.particleSpread + Math.sin(t * 0.2 + i) * 1.5;
    pp.array[i * 3 + 1] = oy * current.particleSpread + Math.cos(t * 0.15 + i) * 1.5;
  }
  pp.needsUpdate = true;

  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════════════════════════════════════
//  TEACHABLE MACHINE
// ═══════════════════════════════════════════════════════════════════════
let model, maxPredictions;
let lastPrediction = null;
let lastImageDataURL = null;

const statusEl = document.getElementById('status');
const analyseBtn = document.getElementById('analyse-btn');
const imageUpload = document.getElementById('image-upload');
const previewImage = document.getElementById('preview-image');
const dropZone = document.getElementById('drop-zone');
const dropLabel = document.getElementById('drop-zone-label');
const classifications = document.getElementById('classifications');
const chips = [0, 1, 2].map(i => document.getElementById(`chip-${i}`));
const llmSection = document.getElementById('llm-section');
const llmDivider = document.getElementById('llm-divider');
const llmBtn = document.getElementById('llm-btn');
const llmFeedback = document.getElementById('llm-feedback');
const downloadBtn = document.getElementById('download-btn');

function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
}

async function initModel() {
  setStatus('Loading AI vision model…');
  try {
    const url = '/ai/model.json';
    const meta = '/ai/metadata.json';
    
    console.log("Loading TM model from:", url);
    model = await tmImage.load(url, meta);
    console.log("Model loaded successfully.");
    maxPredictions = model.getTotalClasses();

    // Build classification bars
    classifications.innerHTML = '';
    for (let i = 0; i < maxPredictions; i++) {
      const row = document.createElement('div');
      row.className = 'cls-row';
      row.id = `cls-row-${i}`;
      row.innerHTML = `
        <div class="cls-top">
          <span class="cls-name" id="cls-name-${i}">—</span>
          <span class="cls-pct" id="cls-pct-${i}">—</span>
        </div>
        <div class="cls-track"><div class="cls-fill" id="cls-fill-${i}"></div></div>
      `;
      classifications.appendChild(row);
    }

    setStatus('Vision engine ready. Upload image.', 'active');
    analyseBtn.disabled = false;
  } catch (e) {
    console.error("Model load error:", e);
    setStatus('Connection Error: Check AI model path.', 'error');
  }
}
initModel();

// Image selection
imageUpload.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Downscale to max 512px for API stability
      const canvas = document.createElement('canvas');
      const maxDim = 512;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h *= maxDim / w; w = maxDim; }
      else if (h > maxDim) { w *= maxDim / h; h = maxDim; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      lastImageDataURL = canvas.toDataURL('image/jpeg', 0.85);
      
      previewImage.src = lastImageDataURL;
      previewImage.style.display = 'block';
      dropLabel.style.display = 'none';
      dropLabel.previousElementSibling.style.display = 'none'; // hide svg
      dropZone.classList.add('has-image');
      setStatus('Image loaded. Press Analyse to run.', 'active');
      analyseBtn.disabled = !model;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

analyseBtn.addEventListener('click', async () => {
  if (!model || !previewImage.src) return;
  analyseBtn.disabled = true;
  setStatus('Preprocessing…');

  await new Promise(resolve => {
    if (previewImage.complete) { resolve(); return; }
    previewImage.onload = resolve;
  });

  const canvas = document.createElement('canvas');
  canvas.width = 224; canvas.height = 224;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, 224, 224);
  const size = Math.min(previewImage.naturalWidth, previewImage.naturalHeight);
  const sx = (previewImage.naturalWidth - size) / 2;
  const sy = (previewImage.naturalHeight - size) / 2;
  ctx.drawImage(previewImage, sx, sy, size, size, 0, 0, 224, 224);

  try {
    setStatus('Running classification…');
    const preds = await model.predict(canvas);
    lastPrediction = preds;
    displayResults(preds);
    updateWireframe(preds);
    showLLMSection();
    setStatus('Classification complete.', 'active');
  } catch (e) {
    console.error(e);
    setStatus('Error: ' + e.message, 'error');
  }
  analyseBtn.disabled = false;
});

function displayResults(preds) {
  const sorted = [...preds].sort((a, b) => b.probability - a.probability);

  preds.forEach((p, i) => {
    const nameEl = document.getElementById(`cls-name-${i}`);
    const pctEl = document.getElementById(`cls-pct-${i}`);
    const fillEl = document.getElementById(`cls-fill-${i}`);
    if (!nameEl) return;
    nameEl.textContent = p.className;
    const pct = (p.probability * 100).toFixed(1);
    pctEl.textContent = pct + '%';
    fillEl.style.width = pct + '%';
    fillEl.className = 'cls-fill' + (p === sorted[0] || p === sorted[1] ? ' dominant' : '');
  });

  // Update corner chips
  sorted.slice(0, 3).forEach((p, i) => {
    if (chips[i]) {
      chips[i].textContent = `${p.className}  ${(p.probability * 100).toFixed(0)}%`;
      chips[i].classList.add('active');
    }
  });
}

// ── COMPREHENSIVE FLUID DNA MAPPING (30 WORDS) ────────────────────────
function updateWireframe(preds) {
  const getProb = (names) => {
    return names.reduce((sum, name) => sum + (preds.find(p => p.className === name)?.probability || 0), 0);
  };

  // Group 1: FLUIDITY (Sleekness & Motion)
  const fluidity = getProb(['Flow', 'Continuity', 'Circulation', 'Movement', 'Route', 'Integration', 'Cycle', 'Regeneration', 'Life']);
  
  // Group 2: LIGHT (Reflections & Clarity)
  const light = getProb(['Transparency', 'Glass', 'Reflection', 'Cleansing', 'Rest', 'Balance', 'Ecology', 'Art']);

  // Group 3: DENSITY (Turbulence & Detail) - Note: "Rythm" in labels
  const density = getProb(['Trace', 'Pressure', 'Mechanism', 'Segmentation', 'Distribution', 'Repetition', 'Rythm']);

  // Group 4: VOLUME (Depth & Mystery)
  const volume = getProb(['Depth', 'Mystery', 'Echoes', 'Memory', 'Heritage', 'Accessibility']);

  // ── Apply to Parameters (Galleristic White Mode) ──────────────────
  
  // Color: Sophisticated Dark Greys to Deep Blues
  target.colorR = 0.05 + volume * 0.1;
  target.colorG = 0.05 + fluidity * 0.2;
  target.colorB = 0.05 + light * 0.4;

  // Form: Distortion
  target.fluidDistortion = 0.01 + density * 0.12;
  target.fluidTurbulence = 0.01 + density * 0.2;
  
  // Shape: Stretching (Fluidity)
  target.fluidFlow = fluidity * 0.7; 
  
  // Volume: Expansion (Volume group)
  target.fluidDepth = volume * 0.4;
  target.coreScale = 0.4 + volume * 0.8; // Inner core expansion

  // Light: Iridescence
  target.fluidIridescence = light * 1.0;
  
  // Life: Heartbeat
  target.fluidLife = getProb(['Life', 'Rythm', 'Repetition']) * 0.5;

  // Trails: Ribbon visibility (Density)
  target.ribOpacity = 0.02 + (density * 0.4);
  target.ribSpeed = 0.2 + fluidity * 0.6;

  // Global Scale & View
  const p1 = [...preds].sort((a,b)=>b.probability-a.probability)[0]?.probability || 0;
  target.fluidScale = 0.75 + p1 * 0.15;
  target.cameraZ = 36 - (p1 * 6);
  target.rotationY = 0.0003 + (fluidity * 0.002);
  target.fluidCirculation = fluidity * 0.8;
}

llmBtn.addEventListener('click', generateArtisticFeedback);

async function generateArtisticFeedback() {
  if (!lastPrediction) {
    llmFeedback.textContent = 'Run classification first.';
    llmFeedback.className = 'error-msg';
    return;
  }

  llmBtn.disabled = true;
  llmFeedback.textContent = 'Generating artistic direction…';
  llmFeedback.className = 'thinking';

  // Build a concise text summary of the top classifications
  const sorted = [...lastPrediction].sort((a, b) => b.probability - a.probability);
  const top8 = sorted.slice(0, 8).map(p => `${p.className} (${(p.probability * 100).toFixed(1)}%)`);
  const classificationText = top8.join(', ');

  // Use local proxy to avoid exposing secret and satisfy GitHub scanning
  setStatus('Connecting to local AI proxy…');
  try {
    const response = await fetch('/api/ai/artistic-direction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        classificationText,
        imageBase64: lastImageDataURL 
      })
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error || `Server error: ${response.status}`);
    }

    const data = await response.json();
    let text = data.text || '';
    if (Array.isArray(data) && data[0]?.generated_text) {
      text = data[0].generated_text.trim();
    } else if (data?.generated_text) {
      text = data.generated_text.trim();
    } else if (data?.error) {
      throw new Error(data.error);
    } else {
      text = JSON.stringify(data);
    }

    // Strip any leftover instruction tags
    text = text.replace(/\[INST\].*?\[\/INST\]/gs, '').trim();

    llmFeedback.textContent = text || 'No response generated.';
    llmFeedback.className = '';
    downloadBtn.style.display = 'block'; // Show download button
  } catch (e) {
    console.error(e);
    llmFeedback.textContent = 'Error: ' + (e.message || e);
    llmFeedback.className = 'error-msg';
  }

  llmBtn.disabled = false;
}

// Canvas text wrapper helper
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}
