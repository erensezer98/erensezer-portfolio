<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Factor — Water Installation Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-w: 320px;
      --bg: #04080c;
      --surface: rgba(4, 12, 20, 0.85);
      --border: rgba(100, 200, 255, 0.1);
      --accent: #70d6ff;
      --text-primary: rgba(220, 240, 255, 0.95);
      --text-muted: rgba(220, 240, 255, 0.45);
      --text-dim: rgba(220, 240, 255, 0.25);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Canvas ─────────────────────────────────────────────── */
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ─── Left Panel ─────────────────────────────────────────── */
    #panel {
      position: relative;
      z-index: 10;
      width: var(--panel-w);
      min-width: var(--panel-w);
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(32px) saturate(140%);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #panel-header {
      padding: 32px 24px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #panel-header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 8px;
    }
    #panel-header h1 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    #drop-zone {
      border: 1px solid var(--border);
      background: rgba(100, 200, 255, 0.03);
      border-radius: 12px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    #drop-zone:hover { border-color: var(--accent); background: rgba(100, 200, 255, 0.08); transform: translateY(-2px); }
    #drop-zone-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
    }
    #preview-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #analyse-btn {
      width: 100%;
      padding: 14px;
      background: rgba(112, 214, 255, 0.1);
      border: 1px solid rgba(112, 214, 255, 0.2);
      color: var(--accent);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    #analyse-btn:hover:not(:disabled) { background: rgba(112, 214, 255, 0.2); border-color: var(--accent); box-shadow: 0 0 20px rgba(112, 214, 255, 0.15); }
    #analyse-btn:disabled { opacity: 0.2; cursor: default; filter: grayscale(1); }

    #status { font-size: 11px; color: var(--text-dim); min-height: 32px; }
    #status.active { color: var(--accent); }

    #classifications { display: flex; flex-direction: column; gap: 14px; }
    .cls-row { display: flex; flex-direction: column; gap: 6px; }
    .cls-top { display: flex; justify-content: space-between; align-items: baseline; }
    .cls-name { font-size: 12px; color: var(--text-muted); font-weight: 300; }
    .cls-pct { font-size: 11px; color: var(--text-dim); }
    .cls-track { height: 1px; background: rgba(255,255,255,0.05); }
    .cls-fill { height: 100%; width: 0%; transition: width 1s ease; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

    #llm-section { display: flex; flex-direction: column; gap: 16px; padding-top: 8px; }
    #llm-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
    #llm-feedback {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-primary);
      border-left: 1px solid var(--accent);
      padding-left: 20px;
      opacity: 0.85;
    }
    #llm-btn {
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s;
    }
    #llm-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    #live-dims {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }
    .dim-chip {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      background: rgba(4, 12, 20, 0.4);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      backdrop-filter: blur(4px);
      transition: all 0.5s;
    }
    .dim-chip.active { opacity: 0.8; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="panel">
  <div id="panel-header">
    <div class="eyebrow">Water Workshop · 2026</div>
    <h1>Liquid Installations</h1>
  </div>

  <div id="panel-body">
    <div id="drop-zone" onclick="document.getElementById('image-upload').click()">
      <span id="drop-zone-label">Drop captured space<br>to analyze water flow</span>
      <img id="preview-image" crossorigin="anonymous" />
    </div>
    <input type="file" id="image-upload" accept="image/*" style="display:none">

    <button id="analyse-btn" disabled>Calculate Fluid Dynamics</button>
    <div id="status">Awakening AI sensor...</div>

    <div id="classifications"></div>

    <div id="llm-section" style="display:none">
      <div id="llm-title">Artistic Direction</div>
      <div id="llm-feedback">Waiting for dynamic results...</div>
      <button id="llm-btn" disabled>Request Direction</button>
    </div>
  </div>
</div>

<div id="live-dims">
  <div class="dim-chip" id="chip-0">—</div>
  <div class="dim-chip" id="chip-1">—</div>
  <div class="dim-chip" id="chip-2">—</div>
</div>

<script>
// ─── THREE.JS — WATER THEME ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04080c);
scene.fog = new THREE.FogExp2(0x04080c, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.domElement.id = 'three-canvas';
document.body.appendChild(renderer.domElement);

// 1. Core "Water Drop" Geometry
const coreGeo = new THREE.IcosahedronGeometry(12, 12);
const coreMat = new THREE.MeshBasicMaterial({
  color: 0x70d6ff,
  wireframe: true,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);
const coreBase = new Float32Array(coreGeo.attributes.position.array);

// 2. Sea Surface
const seaGeo = new THREE.PlaneGeometry(100, 100, 60, 60);
seaGeo.rotateX(-Math.PI / 2);
const seaMat = new THREE.MeshBasicMaterial({
  color: 0x004488,
  wireframe: true,
  transparent: true,
  opacity: 0.1,
  blending: THREE.AdditiveBlending
});
const seaMesh = new THREE.Mesh(seaGeo, seaMat);
seaMesh.position.y = -15;
scene.add(seaMesh);
const seaBase = new Float32Array(seaGeo.attributes.position.array);

// 3. Orbital Traces
const TRAIL_COUNT = 80;
const trails = [];
for(let i=0; i<TRAIL_COUNT; i++) {
  const points = [];
  for(let j=0; j<30; j++) points.push(new THREE.Vector3());
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: 0x70d6ff,
    transparent: true,
    opacity: 0.1,
    blending: THREE.AdditiveBlending
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  trails.push({ 
    line, points, 
    radius: 14 + Math.random() * 10, 
    speed: 0.2 + Math.random() * 0.8,
    angle: Math.random() * Math.PI * 2,
    yOff: (Math.random() - 0.5) * 30
  });
}

// Target States
const target = {
  turb: 0.1,
  waveAmp: 1.0,
  opacity: 0.15,
  color: new THREE.Color(0xbde0fe),
  camZ: 40,
  rotSpeed: 0.001
};
const cur = { ...target, color: target.color.clone() };

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;

  // Smoothing
  cur.turb = THREE.MathUtils.lerp(cur.turb, target.turb, 0.05);
  cur.waveAmp = THREE.MathUtils.lerp(cur.waveAmp, target.waveAmp, 0.05);
  cur.opacity = THREE.MathUtils.lerp(cur.opacity, target.opacity, 0.05);
  cur.camZ = THREE.MathUtils.lerp(cur.camZ, target.camZ, 0.02);
  cur.rotSpeed = THREE.MathUtils.lerp(cur.rotSpeed, target.rotSpeed, 0.05);
  cur.color.lerp(target.color, 0.05);

  camera.position.z = cur.camZ;
  coreMesh.rotation.y += cur.rotSpeed;

  // Core Morph
  const pos = coreGeo.attributes.position;
  for(let i=0; i<pos.count; i++) {
    const x = coreBase[i*3], y = coreBase[i*3+1], z = coreBase[i*3+2];
    const noise = Math.sin(x*0.2 + t) * Math.cos(y*0.2 + t*1.1) * cur.turb;
    pos.array[i*3] = x * (1 + noise);
    pos.array[i*3+1] = y * (1 + noise);
    pos.array[i*3+2] = z * (1 + noise);
  }
  pos.needsUpdate = true;
  coreMat.opacity = cur.opacity;
  coreMat.color.copy(cur.color);

  // Sea Wave
  const sPos = seaGeo.attributes.position;
  for(let i=0; i<sPos.count; i++) {
    const bx = seaBase[i*3], bz = seaBase[i*3+2];
    const d = Math.sqrt(bx*bx + bz*bz);
    sPos.array[i*3+1] = Math.sin(d*0.1 - t*1.5) * cur.waveAmp;
  }
  sPos.needsUpdate = true;
  seaMat.color.copy(cur.color).multiplyScalar(0.5);

  // Orbital Traces
  trails.forEach(tr => {
    tr.angle += tr.speed * cur.rotSpeed * 10;
    const x = Math.cos(tr.angle) * tr.radius;
    const z = Math.sin(tr.angle) * tr.radius;
    const y = tr.yOff + Math.sin(t + tr.angle) * 5;
    
    tr.points.push(new THREE.Vector3(x, y, z));
    if(tr.points.length > 30) tr.points.shift();
    tr.line.geometry.setFromPoints(tr.points);
    tr.line.material.color.copy(cur.color);
    tr.line.material.opacity = cur.opacity * 0.8;
  });

  renderer.render(scene, camera);
}
animate();

// ─── TEACHABLE MACHINE & UI ──────────────────────────────────────────
let tmModel, lastPred, imageBase;
const chips = [0,1,2].map(i => document.getElementById(`chip-${i}`));

async function init() {
  try {
    tmModel = await tmImage.load('/ai/model.json', '/ai/metadata.json');
    document.getElementById('status').textContent = 'Sensors Active. Waiting for flow...';
    document.getElementById('status').classList.add('active');
    document.getElementById('analyse-btn').disabled = false;
    
    // Build containers
    const container = document.getElementById('classifications');
    for(let i=0; i<tmModel.getTotalClasses(); i++) {
      container.innerHTML += `<div class="cls-row" id="row-${i}">
        <div class="cls-top"><span class="cls-name"></span><span class="cls-pct"></span></div>
        <div class="cls-track"><div class="cls-fill"></div></div>
      </div>`;
    }
  } catch(e) { document.getElementById('status').textContent = 'Sensor Error.'; }
}
init();

document.getElementById('image-upload').onchange = (e) => {
  const f = e.target.files[0];
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      const max = 512;
      let w = img.width, h = img.height;
      if(w > h && w > max) { h *= max/w; w = max; } else if(h > max) { w *= max/h; h = max; }
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      imageBase = cv.toDataURL('image/jpeg', 0.85);
      document.getElementById('preview-image').src = imageBase;
      document.getElementById('preview-image').style.display = 'block';
    };
    img.src = ev.target.result;
  }
  r.readAsDataURL(f);
};

document.getElementById('analyse-btn').onclick = async () => {
  const img = document.getElementById('preview-image');
  if(!tmModel || !img.src) return;
  
  const preds = await tmModel.predict(img);
  lastPred = preds;
  const sorted = [...preds].sort((a,b) => b.probability - a.probability);
  
  preds.forEach((p, i) => {
    const row = document.getElementById(`row-${i}`);
    row.querySelector('.cls-name').textContent = p.className;
    row.querySelector('.cls-pct').textContent = (p.probability*100).toFixed(0)+'%';
    row.querySelector('.cls-fill').style.width = (p.probability*100)+'%';
  });

  sorted.slice(0,3).forEach((p, i) => {
    chips[i].textContent = `${p.className} ${ (p.probability*100).toFixed(0) }%`;
    chips[i].classList.add('active');
  });

  updateVis(preds);
  document.getElementById('llm-section').style.display = 'flex';
  document.getElementById('llm-btn').disabled = false;
};

function updateVis(preds) {
  const s = [...preds].sort((a,b) => b.probability - a.probability);
  const p1 = s[0].probability, p2 = s[1].probability, p3 = s[2].probability;
  
  // Mapping
  target.turb = p1 * 8.0;
  target.waveAmp = 1.0 + p2 * 5.0;
  target.rotSpeed = 0.001 + p3 * 0.01;
  target.opacity = 0.1 + p1 * 0.4;
  target.camZ = 50 - p1 * 20;

  // Colors based on concepts
  if(s[0].className === 'Transparency' || s[0].className === 'Glass') {
    target.color = new THREE.Color(0xd0f4f7);
  } else if(s[0].className === 'Trace' || s[0].className === 'Movement') {
    target.color = new THREE.Color(0x70d6ff);
  } else {
    target.color = new THREE.Color(0x0077b6);
  }
}

document.getElementById('llm-btn').onclick = async () => {
  const btn = document.getElementById('llm-btn');
  const box = document.getElementById('llm-feedback');
  btn.disabled = true;
  box.textContent = 'Consulting the director...';
  
  const sorted = [...lastPred].sort((a,b) => b.probability - a.probability);
  const text = sorted.slice(0,8).map(p => `${p.className} (${(p.probability*100).toFixed(1)}%)`).join(', ');

  try {
    const res = await fetch('/api/ai/artistic-direction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classificationText: text, imageBase64: imageBase })
    });
    const d = await res.json();
    box.textContent = d.generated_text || 'Silence in the studio.';
  } catch(e) { box.textContent = 'Connection lost.'; }
  btn.disabled = false;
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
