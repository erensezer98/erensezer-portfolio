<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Factor — AI Artistic Direction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-w: 320px;
      --bg: #ffffff;
      --surface: rgba(255, 255, 255, 0.94);
      --border: rgba(0,0,0,0.08);
      --accent: #0077ff;
      --text-primary: #0a0a0a;
      --text-muted: rgba(0,0,0,0.5);
      --text-dim: rgba(0,0,0,0.2);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Canvas ─────────────────────────────────────────────── */
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ─── Left Panel ─────────────────────────────────────────── */
    #panel {
      position: relative;
      z-index: 10;
      width: var(--panel-w);
      min-width: var(--panel-w);
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(120%);
      border-right: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 10px 0 30px rgba(0,0,0,0.02);
    }

    /* Panel Header */
    #panel-header {
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #panel-header .eyebrow {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #panel-header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    /* Scrollable body of panel */
    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Image Upload ─────────────────────────────────────────*/
    #drop-zone {
      border: 1px dashed var(--border);
      border-radius: 8px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    #drop-zone:hover { border-color: var(--accent); background: rgba(0,0,0,0.02); }
    #drop-zone.has-image { border-color: var(--border); }
    #drop-zone-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }
    #drop-zone svg { opacity: 0.4; pointer-events: none; stroke: #000; }
    #preview-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #image-upload { display: none; }

    /* Analyse button */
    #analyse-btn {
      width: 100%;
      padding: 12px;
      background: #000;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    #analyse-btn:hover:not(:disabled) { opacity: 0.8; }
    #analyse-btn:disabled { opacity: 0.15; cursor: not-allowed; }

    /* ─── Status line ─────────────────────────────────────────*/
    #status {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
      min-height: 32px;
      flex-shrink: 0;
    }
    #status.active { color: var(--text-primary); }
    #status.error { color: #ff4444; }

    /* ─── Classification bars ─────────────────────────────────*/
    #classifications {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .cls-row { display: flex; flex-direction: column; gap: 6px; }
    .cls-top { display: flex; justify-content: space-between; align-items: baseline; }
    .cls-name { font-size: 11px; color: var(--text-primary); letter-spacing: 0.05e; text-transform: uppercase; }
    .cls-pct { font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .cls-track {
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,0.05);
      border-radius: 1px;
      overflow: hidden;
    }
    .cls-fill {
      height: 100%;
      width: 0%;
      border-radius: 1px;
      transition: width 0.6s cubic-bezier(0.2, 1, 0.3, 1), background 0.6s;
      background: #ddd;
    }
    .cls-fill.dominant { background: #000; }

    /* ─── Divider ─────────────────────────────────────────────*/
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ─── LLM Feedback ────────────────────────────────────────*/
    #llm-section { flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }

    #llm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #llm-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }

    #llm-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #000;
      color: #000;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      border-radius: 4px;
    }
    #llm-btn:hover:not(:disabled) { background: #000; color: #fff; }
    #llm-btn:disabled { opacity: 0.15; }

    /* Feedback box */
    #llm-feedback {
      font-size: 13px;
      line-height: 1.65;
      color: #222;
      min-height: 48px;
      border-left: 2px solid #000;
      padding-left: 14px;
    }

    /* ─── Scrollbar ───────────────────────────────────────────*/
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    /* ─── Wireframe active dims indicator (top-right) ─────────*/
    #live-dims {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      pointer-events: none;
    }
    .dim-chip {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.4s, color 0.4s;
    }
    .dim-chip.active { opacity: 1; color: #000; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

<!-- ── Left Panel ──────────────────────────────────────────────────── -->
<div id="panel">
  <div id="panel-header">
    <div class="eyebrow">Experiment · AI Form Factor</div>
    <h1>Artistic Direction Engine</h1>
  </div>

  <div id="panel-body">

    <!-- Image -->
    <div id="drop-zone" onclick="document.getElementById('image-upload').click()" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span id="drop-zone-label">Upload image<br>to begin</span>
      <img id="preview-image" crossorigin="anonymous" alt="Preview" />
    </div>
    <input type="file" id="image-upload" style="display:none" accept="image/*">

    <button id="analyse-btn" disabled>Analyse Image</button>

    <!-- Status -->
    <div id="status">Connecting to AI engine…</div>

    <!-- Classifications -->
    <div id="classifications"></div>

    <div class="divider" id="llm-divider" style="display:none"></div>

    <!-- LLM Artistic Direction -->
    <div id="llm-section" style="display:none">
      <div id="llm-header">
        <span id="llm-title">Artistic Direction · LLM</span>
      </div>

      <div id="llm-feedback">Analysis results will appear here after classification.</div>
      <button id="llm-btn" disabled>Generate Artistic Direction</button>
      <button id="download-btn" style="display: none; width: 100%; padding: 12px; background: #0081ff; color: #fff; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; border-radius: 4px; margin-top: 12px;">Download Submission</button>
    </div>

  </div><!-- /panel-body -->
</div><!-- /panel -->

<!-- ── Live Dimension Chips ────────────────────────────────────────── -->
<div id="live-dims">
  <div class="dim-chip" id="chip-0">—</div>
  <div class="dim-chip" id="chip-1">—</div>
  <div class="dim-chip" id="chip-2">—</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  THREE.JS — SPATIAL FINGERPRINT (GENERATIVE CORE)
// ═══════════════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
renderer.setClearColor(0xffffff, 1);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.domElement.id = 'three-canvas';
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTING ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const pointLight = new THREE.PointLight(0x0044ff, 1.2, 50);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// ── GEOMETRY & MATERIALS ─────────────────────────────────────────────
const baseGeometry = new THREE.IcosahedronGeometry(2, 24); 
const positionAttribute = baseGeometry.attributes.position;
const originalVertices = [];
for (let i = 0; i < positionAttribute.count; i++) {
  originalVertices.push(new THREE.Vector3().fromBufferAttribute(positionAttribute, i));
}

const coreMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x001133,
  metalness: 0.1,
  roughness: 0.2,
  transparent: true,
  opacity: 0.9,
  transmission: 0 // Remove transmission for visibility stability on white
});
const innerMesh = new THREE.Mesh(baseGeometry, coreMaterial);
scene.add(innerMesh);

// ALWAYS VISIBLE WIREFRAME (Visibility Safety)
const alwaysWireMat = new THREE.MeshBasicMaterial({
  color: 0x222222,
  wireframe: true,
  transparent: true,
  opacity: 0.08,
  depthWrite: false
});
const alwaysWireMesh = new THREE.Mesh(baseGeometry, alwaysWireMat);
scene.add(alwaysWireMesh);

// ── VORTEX TRAILS (REPLACING THE OUTER BLOB) ────────────────────────
const TRAIL_COUNT = 12;
const trails = [];
const trailMat = new THREE.LineBasicMaterial({ 
  color: 0x0044cc, // Royal Blue for contrast
  transparent: true, 
  opacity: 0.2,
  blending: THREE.NormalBlending 
});

for (let i = 0; i < TRAIL_COUNT; i++) {
  const points = [];
  for (let j = 0; j < 50; j++) points.push(new THREE.Vector3());
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geometry, trailMat.clone());
  scene.add(line);
  trails.push({ 
    line, 
    pts: points, 
    offset: Math.random() * 100, 
    speed: 0.2 + Math.random() * 0.4 
  });
}

// ── POST-PROCESSING (BLOOM) ──────────────────────────────────────────
const renderScene = new THREE.RenderPass(scene, camera);
const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0.2; 
bloomPass.strength = 0.7; // Subtle for white bg
bloomPass.radius = 0.4;

const composer = new THREE.EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// ── TARGET PARAMS (mapped from AI) ───────────────────────────────────
const target = {
  flow: 0.0,
  pressure: 0.0,
  glass: 0.0,
  depth: 0.0,
  mechanism: 0.0,
  rhythm: 0.0,
  rest: 0.5,
  cameraZ: 12
};
const current = { ...target };
const lp = 0.04; 

function lerp(a, b, t) { return a + (b - a) * t; }

// ── ANIMATION LOOP ───────────────────────────────────────────────────
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  
  // Lerp parameters
  for (const k of Object.keys(target)) {
    current[k] = lerp(current[k], target[k], lp);
  }

  const speed = 0.012 * (1.0 - (current.rest * 0.8));
  time += speed;

  const positions = baseGeometry.attributes.position;
  
  for (let i = 0; i < positions.count; i++) {
    const v = originalVertices[i];
    const noiseFreq = 1.0 + (current.mechanism * 6.0);
    const noiseAmp = 0.25 * (1.0 - current.rest);
    
    let displacement = Math.sin(v.x * noiseFreq + time) * 
                       Math.cos(v.y * noiseFreq + time) * 
                       Math.cos(v.z * noiseFreq + time) * noiseAmp;
    
    let newX = v.x + displacement;
    let newY = v.y + displacement;
    let newZ = v.z + displacement;

    // Fluid stretching (Flow)
    if (v.y < 0) newY -= Math.abs(v.y) * current.flow * 1.5;
    
    // Pressure elongation
    newY *= (1.0 - current.pressure * 0.5);
    newX *= (1.0 + current.pressure * 0.3);
    newZ *= (1.0 + current.pressure * 0.3);

    positions.setXYZ(i, newX, newY, newZ);
  }
  
  baseGeometry.attributes.position.needsUpdate = true;
  baseGeometry.computeVertexNormals();

  // Material updates
  // Stay consistently DARK on white background
  coreMaterial.color.setHSL(0.61, 0.9, 0.15 - (current.glass * 0.05)); 
  coreMaterial.opacity = 0.95 - (current.glass * 0.2); 
  
  const pulse = 1.0 + (Math.sin(time * 4) * current.rhythm * 0.12);
  innerMesh.scale.set(pulse, pulse, pulse);

  // Animate Vortex Trails
  trails.forEach((t, idx) => {
    const positions = t.line.geometry.attributes.position;
    for (let i = 0; i < t.pts.length; i++) {
      const pIdx = i / t.pts.length;
      const angle = pIdx * Math.PI * 2 + time * t.speed + t.offset;
      const r = (3 + current.flow * 2) + Math.sin(time + idx) * 0.5;
      
      const tx = Math.cos(angle) * r;
      const ty = (pIdx - 0.5) * 10 + Math.sin(time * 0.5 + t.offset) * 2;
      const tz = Math.sin(angle) * r;
      
      positions.setXYZ(i, tx, ty, tz);
    }
    positions.needsUpdate = true;
    t.line.material.opacity = (0.1 + current.flow * 0.4) * (1.0 - current.rest * 0.5);
  });

  scene.fog.density = 0.015 + (current.depth * 0.04);
  innerMesh.rotation.y = time * 0.15;
  
  controls.update();
  composer.render(); 
}
animate();

// ═══════════════════════════════════════════════════════════════════════
//  TEACHABLE MACHINE
// ═══════════════════════════════════════════════════════════════════════
let model, maxPredictions;
let lastPrediction = null;
let lastImageDataURL = null;

const statusEl = document.getElementById('status');
const analyseBtn = document.getElementById('analyse-btn');
const imageUpload = document.getElementById('image-upload');
const previewImage = document.getElementById('preview-image');
const dropZone = document.getElementById('drop-zone');
const dropLabel = document.getElementById('drop-zone-label');
const classifications = document.getElementById('classifications');
const chips = [0, 1, 2].map(i => document.getElementById(`chip-${i}`));
const llmSection = document.getElementById('llm-section');
const llmDivider = document.getElementById('llm-divider');
const llmBtn = document.getElementById('llm-btn');
const llmFeedback = document.getElementById('llm-feedback');
const downloadBtn = document.getElementById('download-btn');

function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
}

async function initModel() {
  setStatus('Loading AI vision model…');
  try {
    const url = '/ai/model.json';
    const meta = '/ai/metadata.json';
    
    console.log("Loading TM model from:", url);
    model = await tmImage.load(url, meta);
    console.log("Model loaded successfully.");
    maxPredictions = model.getTotalClasses();

    // Build classification bars
    classifications.innerHTML = '';
    for (let i = 0; i < maxPredictions; i++) {
      const row = document.createElement('div');
      row.className = 'cls-row';
      row.id = `cls-row-${i}`;
      row.innerHTML = `
        <div class="cls-top">
          <span class="cls-name" id="cls-name-${i}">—</span>
          <span class="cls-pct" id="cls-pct-${i}">—</span>
        </div>
        <div class="cls-track"><div class="cls-fill" id="cls-fill-${i}"></div></div>
      `;
      classifications.appendChild(row);
    }

    setStatus('Vision engine ready. Upload image.', 'active');
    analyseBtn.disabled = false;
  } catch (e) {
    console.error("Model load error:", e);
    setStatus('Connection Error: Check AI model path.', 'error');
  }
}
initModel();

// Image selection
imageUpload.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Downscale to max 512px for API stability
      const canvas = document.createElement('canvas');
      const maxDim = 512;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h *= maxDim / w; w = maxDim; }
      else if (h > maxDim) { w *= maxDim / h; h = maxDim; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      lastImageDataURL = canvas.toDataURL('image/jpeg', 0.85);
      
      previewImage.src = lastImageDataURL;
      previewImage.style.display = 'block';
      dropLabel.style.display = 'none';
      dropLabel.previousElementSibling.style.display = 'none'; // hide svg
      dropZone.classList.add('has-image');
      setStatus('Image loaded. Press Analyse to run.', 'active');
      analyseBtn.disabled = !model;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

analyseBtn.addEventListener('click', async () => {
  if (!model || !previewImage.src) return;
  analyseBtn.disabled = true;
  setStatus('Preprocessing…');

  await new Promise(resolve => {
    if (previewImage.complete) { resolve(); return; }
    previewImage.onload = resolve;
  });

  const canvas = document.createElement('canvas');
  canvas.width = 224; canvas.height = 224;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, 224, 224);
  const size = Math.min(previewImage.naturalWidth, previewImage.naturalHeight);
  const sx = (previewImage.naturalWidth - size) / 2;
  const sy = (previewImage.naturalHeight - size) / 2;
  ctx.drawImage(previewImage, sx, sy, size, size, 0, 0, 224, 224);

  try {
    setStatus('Running classification…');
    const preds = await model.predict(canvas);
    lastPrediction = preds;
    displayResults(preds);
    updateWireframe(preds);
    showLLMSection();
    setStatus('Classification complete.', 'active');
  } catch (e) {
    console.error(e);
    setStatus('Error: ' + e.message, 'error');
  }
  analyseBtn.disabled = false;
});

function displayResults(preds) {
  const sorted = [...preds].sort((a, b) => b.probability - a.probability);

  preds.forEach((p, i) => {
    const nameEl = document.getElementById(`cls-name-${i}`);
    const pctEl = document.getElementById(`cls-pct-${i}`);
    const fillEl = document.getElementById(`cls-fill-${i}`);
    if (!nameEl) return;
    nameEl.textContent = p.className;
    const pct = (p.probability * 100).toFixed(1);
    pctEl.textContent = pct + '%';
    fillEl.style.width = pct + '%';
    fillEl.className = 'cls-fill' + (p === sorted[0] || p === sorted[1] ? ' dominant' : '');
  });

  // Update corner chips
  sorted.slice(0, 3).forEach((p, i) => {
    if (chips[i]) {
      chips[i].textContent = `${p.className}  ${(p.probability * 100).toFixed(0)}%`;
      chips[i].classList.add('active');
    }
  });
}

// ── COMPREHENSIVE FLUID DNA MAPPING (30 WORDS) ────────────────────────
function updateWireframe(preds) {
  const getProb = (names) => {
    return names.reduce((sum, name) => sum + (preds.find(p => p.className === name)?.probability || 0), 0);
  };

  // Group 1: FLUIDITY (Sleekness & Motion)
  const fluidity = getProb(['Flow', 'Continuity', 'Circulation', 'Movement', 'Route', 'Integration', 'Cycle', 'Regeneration', 'Life']);
  
  // Group 2: LIGHT (Reflections & Clarity)
  const light = getProb(['Transparency', 'Glass', 'Reflection', 'Cleansing', 'Rest', 'Balance', 'Ecology', 'Art']);

  // Group 3: DENSITY (Turbulence & Detail) - Note: "Rythm" in labels
  const density = getProb(['Trace', 'Pressure', 'Mechanism', 'Segmentation', 'Distribution', 'Repetition', 'Rythm']);

  // Group 4: VOLUME (Depth & Mystery)
  const volume = getProb(['Depth', 'Mystery', 'Echoes', 'Memory', 'Heritage', 'Accessibility']);

  // ── Apply to Parameters (Spatial Fingerprint) ──────────────────
  target.flow = fluidity * 0.8;
  target.pressure = density * 0.7;
  target.glass = light * 1.0;
  target.depth = volume * 1.0;
  target.mechanism = density * 0.8;
  target.rhythm = getProb(['Life', 'Rythm', 'Repetition']) * 0.8;
  target.rest = getProb(['Rest', 'Balance', 'Ecology']) * 1.0;
  
  // Camera zoom based on dominant confidence
  const p1 = [...preds].sort((a,b)=>b.probability-a.probability)[0]?.probability || 0;
  target.cameraZ = 13 - (p1 * 4);
}

function showLLMSection() {
  llmDivider.style.display = '';
  llmSection.style.display = '';
  llmBtn.disabled = false;
}

// ═══════════════════════════════════════════════════════════════════════
//  LLM — Hugging Face Inference API (free)
// ═══════════════════════════════════════════════════════════════════════
// Model: mistralai/Mistral-7B-Instruct-v0.3 (free, no billing required)
// User must paste a read-only Inference token from huggingface.co/settings/tokens

llmBtn.addEventListener('click', generateArtisticFeedback);

async function generateArtisticFeedback() {
  if (!lastPrediction) {
    llmFeedback.textContent = 'Run classification first.';
    llmFeedback.className = 'error-msg';
    return;
  }

  llmBtn.disabled = true;
  llmFeedback.textContent = 'Generating artistic direction…';
  llmFeedback.className = 'thinking';

  // Build a concise text summary of the top classifications
  const sorted = [...lastPrediction].sort((a, b) => b.probability - a.probability);
  const top8 = sorted.slice(0, 8).map(p => `${p.className} (${(p.probability * 100).toFixed(1)}%)`);
  const classificationText = top8.join(', ');

  // Use local proxy to avoid exposing secret and satisfy GitHub scanning
  setStatus('Connecting to local AI proxy…');
  try {
    const response = await fetch('/api/ai/artistic-direction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        classificationText,
        imageBase64: lastImageDataURL 
      })
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error || `Server error: ${response.status}`);
    }

    const data = await response.json();
    let text = data.text || '';
    if (Array.isArray(data) && data[0]?.generated_text) {
      text = data[0].generated_text.trim();
    } else if (data?.generated_text) {
      text = data.generated_text.trim();
    } else if (data?.error) {
      throw new Error(data.error);
    } else {
      text = JSON.stringify(data);
    }

    // Strip any leftover instruction tags
    text = text.replace(/\[INST\].*?\[\/INST\]/gs, '').trim();

    llmFeedback.textContent = text || 'No response generated.';
    llmFeedback.className = '';
    downloadBtn.style.display = 'block'; // Show download button
  } catch (e) {
    console.error(e);
    llmFeedback.textContent = 'Error: ' + (e.message || e);
    llmFeedback.className = 'error-msg';
  }

  llmBtn.disabled = false;
}

// ── DOWNLOAD SUBMISSION (Canvas Composition) ────────────────────────
downloadBtn.addEventListener('click', async () => {
  downloadBtn.textContent = 'Preparing Layout…';
  downloadBtn.disabled = true;

  // Wait a moment for last lerp to settle
  await new Promise(r => setTimeout(r, 600));

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  // Set A4 (High Res: 2480 x 3508 for 300dpi, or use 1414x2000 for web)
  canvas.width = 1414;
  canvas.height = 2000;
  
  // 1. Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 2. Header
  ctx.fillStyle = '#000000';
  ctx.font = '500 52px Inter, sans-serif';
  ctx.fillText('Form Factor — Workshop Submission', 80, 140);
  ctx.font = '300 22px Inter, sans-serif';
  ctx.fillStyle = '#888888';
  ctx.fillText('AI-Driven Artistic Direction & Fluidic Geometry', 80, 185);
  
  // 3. Images (Uploaded vs 3D Core)
  const imgSize = 580;
  const imgY = 280;
  
  // ORIGINAL INPUT
  if (previewImage.src) {
    ctx.drawImage(previewImage, 80, imgY, imgSize, imgSize);
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 1;
    ctx.strokeRect(80, imgY, imgSize, imgSize);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 13px Inter, sans-serif';
    ctx.fillText('INPUT IMAGE', 80, imgY - 20);
  }
  
  // GENERATED FLUIDIC CORE
  // IMPORTANT: Force render via composer to ensure bloom is captured
  composer.render();
  const threeCanvas = renderer.domElement;
  
  // Capture a square from the center of the threeCanvas
  const side = Math.min(threeCanvas.width, threeCanvas.height);
  const sx = (threeCanvas.width - side) / 2;
  const sy = (threeCanvas.height - side) / 2;
  
  ctx.drawImage(threeCanvas, sx, sy, side, side, 755, imgY, imgSize, imgSize);
  ctx.strokeRect(755, imgY, imgSize, imgSize);
  ctx.fillStyle = '#000';
  ctx.fillText('RESULTANT FLUIDIC CORE', 755, imgY - 20);

  // 4. Classification
  ctx.fillStyle = '#000';
  ctx.font = 'bold 15px Inter, sans-serif';
  ctx.fillText('VISION ANALYSIS (TOP 5)', 80, 960);
  
  const sorted = [...lastPrediction].sort((a, b) => b.probability - a.probability);
  sorted.slice(0, 5).forEach((p, i) => {
    const y = 1010 + i * 50;
    const barMax = 400;
    ctx.fillStyle = '#f9f9f9';
    ctx.fillRect(80, y, barMax, 6);
    ctx.fillStyle = '#0081ff';
    ctx.fillRect(80, y, barMax * p.probability, 6);
    
    ctx.fillStyle = '#333';
    ctx.font = '16px Inter, sans-serif';
    ctx.fillText(p.className, 80 + barMax + 30, y + 8);
    ctx.fillStyle = '#aaa';
    ctx.fillText(`${(p.probability * 100).toFixed(1)}%`, 1200, y + 8);
  });

  // 5. Artistic Direction
  ctx.fillStyle = '#000000';
  ctx.fillRect(80, 1320, 1254, 1);
  ctx.font = 'bold 15px Inter, sans-serif';
  ctx.fillText('ARTISTIC DIRECTION FEEDBACK', 80, 1370);
  
  ctx.fillStyle = '#333333';
  ctx.font = '24px Inter, sans-serif';
  const text = llmFeedback.textContent;
  wrapText(ctx, text, 80, 1430, 1200, 42);

  // 6. Footer
  ctx.fillStyle = '#999';
  ctx.font = '14px Inter, sans-serif';
  ctx.fillText(`Timestamp: ${new Date().toLocaleString('en-US', { dateStyle: 'long', timeStyle: 'short' })}`, 80, 1920);
  ctx.fillText('Google DeepMind Advanced Agentic Coding Workshop Prototype', 1000, 1920);

  // 7. Download
  const link = document.createElement('a');
  link.download = `formfactor_submission_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png', 1.0);
  link.click();

  downloadBtn.textContent = 'Download Submission';
  downloadBtn.disabled = false;
});

// Canvas text wrapper helper
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    const testWidth = metrics.width;
    if (testWidth > maxWidth && n > 0) {
      ctx.fillText(line, x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}
