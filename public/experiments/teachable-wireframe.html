<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teachable Wireframe</title>
  <style>
    /* Premium dark mode UI */
    body { margin: 0; background-color: #050505; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; display: flex;}
    #ui-container { position: absolute; top: 0; left: 0; width: 340px; height: 100%; padding: 24px; box-sizing: border-box; background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1); z-index: 10; display: flex; flex-direction: column; gap: 16px; overflow-y: auto;}
    canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;}
    h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 16px 0; color: #aaa; }
    
    .upload-btn { background: #fff; color: #000; border: none; padding: 12px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 4px; transition: opacity 0.2s; text-align: center;}
    .upload-btn:hover { opacity: 0.8; }
    #image-upload { display: none; }
    

    #preview-container { width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative;}
    #preview-image { width: 100%; height: 100%; object-fit: cover; display: none; }
    
    .label-row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0 4px 0;}
    .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 8px; overflow: hidden;}
    .progress-bar-fill { height: 100%; background: #fff; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);}
    
    #status { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.5; }
    
    /* Scrollbar styling for a premium feel */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
  </style>
  <!-- Load TensorFlow.js and Teachable Machine Image -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <!-- Load Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="ui-container">
    <h1>AI Form Factor</h1>
    
    <div id="status">Connecting to onboard AI engine...</div>

    <div style="flex:1;"></div>

    <div id="preview-container">
      <span id="preview-text" style="font-size: 12px; color: #666;">No image selected</span>
      <img id="preview-image" crossorigin="anonymous" />
    </div>

    <label for="image-upload" class="upload-btn" id="upload-label" style="opacity: 0.3; pointer-events: none;">Select Image</label>
    <input type="file" id="image-upload" accept="image/*">

    <div id="label-container" style="display: flex; flex-direction: column; margin-top: 8px;"></div>
  </div>

  <script>
    // ----------------------------------------------------
    // THREE.JS SETUP
    // ----------------------------------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.03);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 18;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
    document.body.appendChild(renderer.domElement);

    // Create complex wireframe geometry
    const geometry = new THREE.IcosahedronGeometry(6, 12); // High density for beautiful distortion
    
    // Store original vertices for morphing via noise
    const positionAttribute = geometry.attributes.position;
    const basePositions = new Float32Array(positionAttribute.count * 3);
    for (let i = 0; i < positionAttribute.count * 3; i++) {
        basePositions[i] = positionAttribute.array[i];
    }

    const material = new THREE.MeshBasicMaterial({ 
      color: 0xffffff, 
      wireframe: true, 
      transparent: true, 
      opacity: 0.4,
      blending: THREE.AdditiveBlending // Glow effect
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Group for base rotation
    const group = new THREE.Group();
    group.add(mesh);
    // Center the group slightly to the right to account for the UI sidebar
    group.position.x = 2;
    scene.add(group);

    // Handle Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Wireframe Animation States
    let targetParams = {
        noiseAmplitude: 0,
        noiseFrequency: 0.3,
        rotationSpeedX: 0.001,
        rotationSpeedY: 0.002,
        scale: 1,
        colorR: 1,
        colorG: 1,
        colorB: 1
    };
    let currentParams = { ...targetParams };

    function animate() {
      requestAnimationFrame(animate);

      // Smoothly interpolate parameters (lerp)
      const lerpFactor = 0.03;
      currentParams.noiseAmplitude += (targetParams.noiseAmplitude - currentParams.noiseAmplitude) * lerpFactor;
      currentParams.noiseFrequency += (targetParams.noiseFrequency - currentParams.noiseFrequency) * lerpFactor;
      currentParams.rotationSpeedX += (targetParams.rotationSpeedX - currentParams.rotationSpeedX) * lerpFactor;
      currentParams.rotationSpeedY += (targetParams.rotationSpeedY - currentParams.rotationSpeedY) * lerpFactor;
      currentParams.scale += (targetParams.scale - currentParams.scale) * lerpFactor;
      
      currentParams.colorR += (targetParams.colorR - currentParams.colorR) * lerpFactor;
      currentParams.colorG += (targetParams.colorG - currentParams.colorG) * lerpFactor;
      currentParams.colorB += (targetParams.colorB - currentParams.colorB) * lerpFactor;

      material.color.setRGB(currentParams.colorR, currentParams.colorG, currentParams.colorB);

      group.rotation.x += currentParams.rotationSpeedX;
      group.rotation.y += currentParams.rotationSpeedY;
      group.scale.setScalar(currentParams.scale);

      // Apply procedural noise distortion to vertices
      const time = Date.now() * 0.0005;
      const positions = mesh.geometry.attributes.position;
      
      for(let i = 0; i < positions.count; i++) {
          const vx = basePositions[i*3];
          const vy = basePositions[i*3+1];
          const vz = basePositions[i*3+2];

          // Subdued sine wave noise based on frequency
          const distortion = Math.sin(vx * currentParams.noiseFrequency + time) * 
                             Math.cos(vy * currentParams.noiseFrequency + time * 0.8) * 
                             Math.sin(vz * currentParams.noiseFrequency + time * 1.2);

          const factor = 1 + distortion * currentParams.noiseAmplitude;

          positions.array[i*3] = vx * factor;
          positions.array[i*3+1] = vy * factor;
          positions.array[i*3+2] = vz * factor;
      }
      positions.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    // ----------------------------------------------------
    // TEACHABLE MACHINE LOGIC
    // ----------------------------------------------------
    let model, maxPredictions;
    const statusEl = document.getElementById('status');
    const uploadBtn = document.getElementById('upload-label');
    const imageUpload = document.getElementById('image-upload');
    const previewImage = document.getElementById('preview-image');
    const previewText = document.getElementById('preview-text');
    const labelContainer = document.getElementById("label-container");

    async function initModel() {
        const url = "/ai/";
        
        try {
            const modelURL = url + "model.json";
            const metadataURL = url + "metadata.json";
            
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            // Rebuild label container UI based on number of classes
            labelContainer.innerHTML = '';
            for (let i = 0; i < maxPredictions; i++) {
                // Class name might not be loaded initially, wait for predict or use placeholder
                const row = document.createElement("div");
                row.className = "label-row";
                row.innerHTML = `<span class="label-name">Class ${i+1}</span><span class="label-val">0%</span>`;
                
                const progressBg = document.createElement('div');
                progressBg.className = 'progress-bar-bg';
                const progressFill = document.createElement('div');
                progressFill.className = 'progress-bar-fill';
                progressBg.appendChild(progressFill);
                
                const wrapper = document.createElement('div');
                wrapper.appendChild(row);
                wrapper.appendChild(progressBg);
                
                labelContainer.appendChild(wrapper);
            }

            statusEl.innerText = "AI Engine ready. Select an image to begin.";
            uploadBtn.style.opacity = '1';
            uploadBtn.style.pointerEvents = 'auto';
        } catch (e) {
            console.error(e);
            statusEl.innerText = "Error loading onboard AI model. Make sure the /ai/ folder exists.";
        }
    }
    
    // Auto-initialize
    initModel();

    // Handle Image Upload
    imageUpload.addEventListener('change', async (e) => {
        if (!model) return;
        const file = e.target.files[0];
        if (!file) return;

        statusEl.innerText = "Parsing image...";
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            previewImage.src = event.target.result;
            previewImage.style.display = 'block';
            previewText.style.display = 'none';
            
            // Wait for image to be fully loaded into DOM before prediction
            previewImage.onload = async () => {
                statusEl.innerText = "Extracting features...";
                await predict(previewImage);
            }
        };
        reader.readAsDataURL(file);
    });

    async function predict(imageElement) {
        if(!model) return;
        
        try {
            // predict can take in an image, video or canvas html element
            const prediction = await model.predict(imageElement);
            
            for (let i = 0; i < maxPredictions; i++) {
                const prob = prediction[i].probability;
                const className = prediction[i].className;
                
                const wrapper = labelContainer.childNodes[i];
                wrapper.querySelector('.label-name').innerText = className;
                wrapper.querySelector('.label-val').innerText = (prob * 100).toFixed(0) + '%';
                wrapper.querySelector('.progress-bar-fill').style.width = (prob * 100) + '%';
            }
            
            statusEl.innerText = "Analysis complete. Form factor updated.";
            
            // Transform wireframe based on findings
            updateWireframeParameters(prediction);
        } catch (err) {
            console.error("Prediction error:", err);
            statusEl.innerText = "Error analyzing image data.";
        }
    }

    // Map AI predictions back to 3D geometry properties
    function updateWireframeParameters(prediction) {
        // Sort predictions by highest probability
        const sorted = [...prediction].sort((a,b) => b.probability - a.probability);
        
        // Extract top probabilities to drive different geometric aspects safely
        const p1 = sorted[0]?.probability || 0;
        const p2 = sorted[1]?.probability || 0;
        const p3 = sorted[2]?.probability || 0;

        // --- Aesthetic Mapping Rules ---

        // 1. Color Interpolation based on array indices mod 3 for deterministic but distinct colors
        targetParams.colorR = 0.1;
        targetParams.colorG = 0.1;
        targetParams.colorB = 0.1;

        prediction.forEach((p, index) => {
            if (index % 3 === 0) targetParams.colorR += p.probability;
            if (index % 3 === 1) targetParams.colorG += p.probability;
            if (index % 3 === 2) targetParams.colorB += p.probability;
        });
        
        // Normalize colors
        const maxC = Math.max(targetParams.colorR, targetParams.colorG, targetParams.colorB, 1.0);
        targetParams.colorR /= maxC;
        targetParams.colorG /= maxC;
        targetParams.colorB /= maxC;

        // Boost brightness slightly
        targetParams.colorR = Math.min(1, targetParams.colorR + 0.2);
        targetParams.colorG = Math.min(1, targetParams.colorG + 0.2);
        targetParams.colorB = Math.min(1, targetParams.colorB + 0.2);

        // 2. Structural Distortion
        // The most dominant class dictates the intensity of the shape breaking apart
        targetParams.noiseAmplitude = p1 * 1.5; // Up to 1.5 multiplier on vertices
        
        // The second class dictates internal frequency / detail of distortion
        // Maps 0->0.1 (smooth) upward to 0.8 (highly detailed peaks)
        targetParams.noiseFrequency = 0.1 + (p2 * 0.7);

        // 3. Movement & Presence
        // The third main class scales it and spins it faster
        targetParams.scale = 1.0 + (p3 * 0.4); 
        targetParams.rotationSpeedX = 0.001 + (p3 * 0.02);
        targetParams.rotationSpeedY = 0.002 + (p1 * 0.03); // Top class also adds wild y-spin
    }
  </script>
</body>
</html>
