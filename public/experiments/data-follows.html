<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Follows</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050505;
      font-family: Arial, sans-serif;
    }

    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.6);
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
      z-index: 10;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 5, 5, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
      backdrop-filter: blur(10px);
      transition: opacity 0.8s ease;
    }

    #start-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 16px 32px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
      font-family: inherit;
    }

    #start-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    #status-text {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      height: 15px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.154.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="overlay">
    <button id="start-btn">Start Camera</button>
    <div id="status-text">Grant camera access to interact</div>
  </div>

  <div id="info">
    Data Follows<br>
    <span style="font-size: 10px; color: #555;">Use your index finger to extrude the landscape</span>
  </div>

  <script type="module">
    import * as THREE from 'three'

    const videoElement = document.createElement('video')
    videoElement.style.display = 'none'
    videoElement.autoplay = true
    videoElement.playsInline = true
    document.body.appendChild(videoElement)

    const mouse = new THREE.Vector2(-100, -100)
    const targetMouse = new THREE.Vector2(-100, -100)

    function onResults(results) {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0]
        const indexFingerTip = landmarks[8]
        targetMouse.x = (1 - indexFingerTip.x) * 2 - 1
        targetMouse.y = -(indexFingerTip.y * 2) + 1
      }
    }

    const hands = new window.Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    })

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6,
    })
    hands.onResults(onResults)

    const mpCamera = new window.Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement })
      },
      width: 640,
      height: 480,
    })

    const overlay = document.getElementById('overlay')
    const startBtn = document.getElementById('start-btn')
    const statusText = document.getElementById('status-text')

    startBtn.addEventListener('click', () => {
      startBtn.innerText = 'Initializing Models...'
      statusText.innerText = 'Please wait, loading MediaPipe Hands...'

      mpCamera
        .start()
        .then(() => {
          overlay.classList.add('hidden')
        })
        .catch((error) => {
          startBtn.innerText = 'Camera Error'
          statusText.innerText = 'Ensure camera permissions are granted.'
          console.error('Camera start error:', error)
        })
    })

    const scene = new THREE.Scene()
    scene.fog = new THREE.FogExp2(0x050505, 0.04)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(0, 12, 18)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setClearColor(0x050505)
    document.body.appendChild(renderer.domElement)

    const gridSize = 40
    const spacing = 1.1
    const count = gridSize * gridSize

    const geometry = new THREE.BoxGeometry(1, 1, 1)
    const material = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      wireframe: true,
      transparent: true,
      opacity: 0.15,
    })

    const instancedMesh = new THREE.InstancedMesh(geometry, material, count)
    const dummy = new THREE.Object3D()
    scene.add(instancedMesh)

    const raycaster = new THREE.Raycaster()
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0)

    window.addEventListener('mousemove', (event) => {
      targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1
      targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1
    })

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    const clock = new THREE.Clock()

    function animate() {
      requestAnimationFrame(animate)
      const time = clock.getElapsedTime()

      mouse.lerp(targetMouse, 0.1)

      raycaster.setFromCamera(mouse, camera)
      const intersectPoint = new THREE.Vector3()
      raycaster.ray.intersectPlane(groundPlane, intersectPoint)

      let index = 0

      for (let x = 0; x < gridSize; x += 1) {
        for (let z = 0; z < gridSize; z += 1) {
          const posX = (x - gridSize / 2) * spacing
          const posZ = (z - gridSize / 2) * spacing
          const baseWave = Math.sin(posX * 0.3 + time) * Math.cos(posZ * 0.3 + time) * 0.5
          let finalHeight = 0.1 + Math.max(0, baseWave)

          const dx = posX - intersectPoint.x
          const dz = posZ - intersectPoint.z
          const distanceToMouse = Math.sqrt(dx * dx + dz * dz)
          const influenceRadius = 10

          if (distanceToMouse < influenceRadius) {
            const influence = 1 - distanceToMouse / influenceRadius
            const towerHeight = Math.pow(influence, 2) * 15
            finalHeight += towerHeight
          }

          dummy.position.set(posX, finalHeight / 2, posZ)
          dummy.scale.set(1, finalHeight, 1)
          dummy.updateMatrix()
          instancedMesh.setMatrixAt(index, dummy.matrix)
          index += 1
        }
      }

      instancedMesh.instanceMatrix.needsUpdate = true
      scene.rotation.y = Math.sin(time * 0.05) * 0.15
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
