<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenTrace — Delaunay Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #03020f;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: -apple-system, monospace;
    }
    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid rgba(120,220,255,0.25);
      background: rgba(0,0,0,0.5);
      color: rgba(120,220,255,0.6);
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .btn:hover, .btn.active {
      border-color: rgba(120,220,255,0.8);
      color: #7df9ff;
      box-shadow: 0 0 12px rgba(125,249,255,0.2);
    }

    #label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120,220,255,0.2);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 5;
    }

    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: rgba(3, 2, 15, 0.92); backdrop-filter: blur(10px); z-index: 20; transition: opacity 0.9s ease;
    }
    #qr-code { border: 10px solid white; border-radius: 8px; background: white; margin-bottom: 18px; }
    #status-text { color: rgba(120,220,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.6; text-align: center; }
    .hidden { opacity: 0; pointer-events: none; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="overlay">
    <canvas id="qr-code"></canvas>
    <div id="status-text">Generating connection...</div>
  </div>

  <canvas id="c"></canvas>
  <div id="label">SCREENTRACE · DELAUNAY MESH</div>

  <div id="ui" style="z-index: 10;">
    <button class="btn active" data-mode="mesh">MESH</button>
    <button class="btn" data-mode="edges">EDGES</button>
    <button class="btn" data-mode="depth">DEPTH</button>
    <button class="btn" data-mode="aurora">AURORA</button>
  </div>

<script>
// ─── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Mode ──────────────────────────────────────────────────────────────────────
let mode = 'mesh';
document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelector('.btn.active').classList.remove('active');
    b.classList.add('active');
    mode = b.dataset.mode;
  });
});

// ─── Delaunay Triangulation (Bowyer-Watson) ────────────────────────────────────
function delaunay(points) {
  if (points.length < 3) return [];

  // Super-triangle that contains all points
  const minX = Math.min(...points.map(p => p.x));
  const minY = Math.min(...points.map(p => p.y));
  const maxX = Math.max(...points.map(p => p.x));
  const maxY = Math.max(...points.map(p => p.y));
  const dx = maxX - minX, dy = maxY - minY;
  const delta = Math.max(dx, dy) * 10;
  const mid = { x: (minX + maxX) / 2, y: (minY + maxY) / 2 };

  const st = [
    { x: mid.x - delta * 2, y: mid.y - delta },
    { x: mid.x,             y: mid.y + delta * 2 },
    { x: mid.x + delta * 2, y: mid.y - delta },
  ];

  let triangles = [st];

  for (const pt of points) {
    // Find all triangles whose circumcircle contains pt
    const bad = [];
    for (const tri of triangles) {
      if (inCircumcircle(pt, tri)) bad.push(tri);
    }

    // Find the boundary polygon of the bad triangles
    const polygon = [];
    for (const tri of bad) {
      for (let i = 0; i < 3; i++) {
        const edge = [tri[i], tri[(i + 1) % 3]];
        // Edge is boundary if it doesn't appear in any other bad triangle
        const shared = bad.some(
          t => t !== tri && edgeShared(edge, t)
        );
        if (!shared) polygon.push(edge);
      }
    }

    // Remove bad triangles
    for (const t of bad) {
      triangles.splice(triangles.indexOf(t), 1);
    }

    // Re-triangulate
    for (const edge of polygon) {
      triangles.push([edge[0], edge[1], pt]);
    }
  }

  // Remove triangles sharing vertices with super-triangle
  return triangles.filter(tri =>
    !tri.some(v => st.some(sv => v === sv))
  );
}

function inCircumcircle(pt, tri) {
  const [a, b, c] = tri;
  const ax = a.x - pt.x, ay = a.y - pt.y;
  const bx = b.x - pt.x, by = b.y - pt.y;
  const cx = c.x - pt.x, cy = c.y - pt.y;
  const det = (ax * (by * (cx*cx + cy*cy) - cy * (bx*bx + by*by)))
            - (ay * (bx * (cx*cx + cy*cy) - cx * (bx*bx + by*by)))
            + ((ax*ax + ay*ay) * (bx * cy - by * cx));
  return det > 0;
}

function edgeShared(edge, tri) {
  for (let i = 0; i < 3; i++) {
    const a = tri[i], b = tri[(i + 1) % 3];
    if ((a === edge[0] && b === edge[1]) || (a === edge[1] && b === edge[0])) return true;
  }
  return false;
}

// ─── Simulated Human Pose (33 MediaPipe landmarks) ─────────────────────────────
// Base positions: normalised 0-1, representing a neutral standing pose
// x: left=0, right=1  |  y: top=0, bottom=1
const BASE_POSE = [
  // FACE (0-10)
  { x: 0.50, y: 0.08, z: 0.00 }, // 0  nose
  { x: 0.47, y: 0.07, z:-0.01 }, // 1  left eye inner
  { x: 0.46, y: 0.07, z:-0.01 }, // 2  left eye
  { x: 0.44, y: 0.07, z:-0.01 }, // 3  left eye outer
  { x: 0.53, y: 0.07, z:-0.01 }, // 4  right eye inner
  { x: 0.54, y: 0.07, z:-0.01 }, // 5  right eye
  { x: 0.56, y: 0.07, z:-0.01 }, // 6  right eye outer
  { x: 0.43, y: 0.09, z:-0.02 }, // 7  left ear
  { x: 0.57, y: 0.09, z:-0.02 }, // 8  right ear
  { x: 0.48, y: 0.10, z: 0.00 }, // 9  mouth left
  { x: 0.52, y: 0.10, z: 0.00 }, // 10 mouth right
  // SHOULDERS / ARMS (11-22)
  { x: 0.36, y: 0.22, z: 0.00 }, // 11 left shoulder
  { x: 0.64, y: 0.22, z: 0.00 }, // 12 right shoulder
  { x: 0.26, y: 0.36, z:-0.02 }, // 13 left elbow
  { x: 0.74, y: 0.36, z:-0.02 }, // 14 right elbow
  { x: 0.20, y: 0.50, z:-0.04 }, // 15 left wrist
  { x: 0.80, y: 0.50, z:-0.04 }, // 16 right wrist
  { x: 0.17, y: 0.52, z:-0.05 }, // 17 left pinky
  { x: 0.83, y: 0.52, z:-0.05 }, // 18 right pinky
  { x: 0.18, y: 0.51, z:-0.05 }, // 19 left index
  { x: 0.82, y: 0.51, z:-0.05 }, // 20 right index
  { x: 0.19, y: 0.53, z:-0.04 }, // 21 left thumb
  { x: 0.81, y: 0.53, z:-0.04 }, // 22 right thumb
  // HIPS / LEGS (23-32)
  { x: 0.42, y: 0.55, z: 0.00 }, // 23 left hip
  { x: 0.58, y: 0.55, z: 0.00 }, // 24 right hip
  { x: 0.42, y: 0.72, z: 0.00 }, // 25 left knee
  { x: 0.58, y: 0.72, z: 0.00 }, // 26 right knee
  { x: 0.42, y: 0.88, z: 0.00 }, // 27 left ankle
  { x: 0.58, y: 0.88, z: 0.00 }, // 28 right ankle
  { x: 0.40, y: 0.91, z: 0.01 }, // 29 left heel
  { x: 0.56, y: 0.91, z: 0.01 }, // 30 right heel
  { x: 0.38, y: 0.93, z: 0.01 }, // 31 left foot index
  { x: 0.54, y: 0.93, z: 0.01 }, // 32 right foot index
];

// Animated oscillations for each landmark
const ANIM = BASE_POSE.map((_, i) => ({
  // Each joint gets slightly different freq/phase/amp so movement looks organic
  fx: 0.3 + Math.random() * 0.4,
  fy: 0.2 + Math.random() * 0.3,
  fz: 0.1 + Math.random() * 0.2,
  px: Math.random() * Math.PI * 2,
  py: Math.random() * Math.PI * 2,
  pz: Math.random() * Math.PI * 2,
  ax: (i < 11 ? 0.008 : i < 23 ? 0.022 : 0.015), // face moves less
  ay: (i < 11 ? 0.005 : i < 23 ? 0.015 : 0.020),
  az: 0.010,
}));

// Breathing cycle (affects torso/shoulders)
const BREATHE_JOINTS = new Set([11,12,23,24,13,14]);

function getPose(t) {
  const breathe = Math.sin(t * 0.8) * 0.008;

  return BASE_POSE.map((base, i) => {
    const a = ANIM[i];
    const bx = BREATHE_JOINTS.has(i) ? breathe * 0.5 : 0;
    const by = BREATHE_JOINTS.has(i) ? -breathe : 0;
    return {
      x: base.x + Math.sin(t * a.fx + a.px) * a.ax + bx,
      y: base.y + Math.sin(t * a.fy + a.py) * a.ay + by,
      z: base.z + Math.sin(t * a.fz + a.pz) * a.az,
    };
  });
}

// Landmark → canvas pixel
function toScreen(lm) {
  // Map x/y to span the entire screen directly so it literally "reaches" the movement
  // When using user-facing camera, x=0 is screen's right, x=1 is screen's left (mirrored)
  // We flip x so it behaves like a mirror:
  const mirrorX = 1 - lm.x;
  
  // Stretch them slightly outside the screen to reach corners more easily
  const paddingX = -0.05; // 5% overscan
  const paddingY = -0.05;
  const width = canvas.width;
  const height = canvas.height;
  
  const spanX = 1 - 2 * paddingX;
  const spanY = 1 - 2 * paddingY;
  
  return {
    x: width * paddingX + mirrorX * width * spanX,
    y: height * paddingY + lm.y * height * spanY,
    z: lm.z,
  };
}

// ─── Colour helpers ────────────────────────────────────────────────────────────
function triCentroid(tri) {
  return {
    x: (tri[0].x + tri[1].x + tri[2].x) / 3,
    y: (tri[0].y + tri[1].y + tri[2].y) / 3,
    z: ((tri[0].z ?? 0) + (tri[1].z ?? 0) + (tri[2].z ?? 0)) / 3,
  };
}

function triArea(tri) {
  const [a, b, c] = tri;
  return Math.abs((b.x-a.x)*(c.y-a.y) - (c.x-a.x)*(b.y-a.y)) / 2;
}

// ─── Draw modes ────────────────────────────────────────────────────────────────

function drawMesh(tris, pts, t) {
  const hueBase = (t * 12) % 360;

  for (const tri of tris) {
    const c = triCentroid(tri);
    const area = triArea(tri);
    const depth = (c.z + 0.1) / 0.2; // 0-1
    const norm  = Math.sqrt((c.x - canvas.width/2)**2 + (c.y - canvas.height/2)**2)
                / (Math.min(canvas.width, canvas.height) * 0.5);

    const hue   = (hueBase + norm * 80 + depth * 40) % 360;
    const light = 30 + depth * 30 + norm * 10;
    const alpha = 0.06 + depth * 0.10 + (1 - Math.min(area / 8000, 1)) * 0.06;

    // Fill
    ctx.beginPath();
    ctx.moveTo(tri[0].x, tri[0].y);
    ctx.lineTo(tri[1].x, tri[1].y);
    ctx.lineTo(tri[2].x, tri[2].y);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue}, 85%, ${light}%, ${alpha})`;
    ctx.fill();

    // Edge
    const edgeAlpha = 0.15 + depth * 0.25;
    ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${edgeAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // Nodes
  for (const p of pts) {
    const depth = (p.z + 0.1) / 0.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5 + depth * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hueBase + 40) % 360}, 100%, 85%, 0.7)`;
    ctx.shadowBlur = 6;
    ctx.shadowColor = `hsl(${hueBase}, 100%, 70%)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawEdges(tris, pts, t) {
  const hueBase = (t * 20) % 360;

  for (const tri of tris) {
    const c = triCentroid(tri);
    const norm = Math.sqrt((c.x - canvas.width/2)**2 + (c.y - canvas.height/2)**2)
               / (Math.min(canvas.width, canvas.height) * 0.5);

    const hue   = (hueBase + norm * 120) % 360;
    const depth = ((tri[0].z ?? 0) + (tri[1].z ?? 0) + (tri[2].z ?? 0)) / 3;
    const alpha = 0.3 + depth * 0.4;

    ctx.beginPath();
    ctx.moveTo(tri[0].x, tri[0].y);
    ctx.lineTo(tri[1].x, tri[1].y);
    ctx.lineTo(tri[2].x, tri[2].y);
    ctx.closePath();

    ctx.strokeStyle = `hsla(${hue}, 100%, 72%, ${alpha})`;
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 4;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Bright nodes
  for (const p of pts) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hueBase + 60) % 360}, 100%, 90%, 0.9)`;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fff';
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawDepth(tris, pts, t) {
  // Sort back-to-front
  const sorted = [...tris].sort((a, b) => {
    const za = (a[0].z + a[1].z + a[2].z) / 3;
    const zb = (b[0].z + b[1].z + b[2].z) / 3;
    return za - zb;
  });

  for (const tri of sorted) {
    const depth = ((tri[0].z ?? 0) + (tri[1].z ?? 0) + (tri[2].z ?? 0)) / 3;
    const d01 = (depth + 0.08) / 0.16; // normalise to 0-1

    // Deep = purple-blue, shallow = cyan-white
    const hue   = 220 - d01 * 80;       // 220 (blue) → 140 (cyan-green)
    const sat   = 80 + d01 * 20;
    const light = 25 + d01 * 45;
    const alpha = 0.08 + d01 * 0.22;

    ctx.beginPath();
    ctx.moveTo(tri[0].x, tri[0].y);
    ctx.lineTo(tri[1].x, tri[1].y);
    ctx.lineTo(tri[2].x, tri[2].y);
    ctx.closePath();

    ctx.fillStyle   = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
    ctx.strokeStyle = `hsla(${hue}, 100%, ${light + 20}%, ${alpha * 1.5})`;
    ctx.lineWidth   = 0.5;
    ctx.fill();
    ctx.stroke();
  }

  for (const p of pts) {
    const d = (p.z + 0.08) / 0.16;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1 + d * 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${180 + d * 40}, 100%, 80%, ${0.5 + d * 0.5})`;
    ctx.fill();
  }
}

function drawAurora(tris, pts, t) {
  const pulse = 0.5 + 0.5 * Math.sin(t * 1.5);

  for (const tri of tris) {
    const c     = triCentroid(tri);
    const area  = triArea(tri);
    const angle = Math.atan2(c.y - canvas.height/2, c.x - canvas.width/2);
    const norm  = Math.sqrt((c.x - canvas.width/2)**2 + (c.y - canvas.height/2)**2)
                / (Math.min(canvas.width, canvas.height) * 0.7);

    // Wave colour based on angle + time
    const hue   = ((angle / Math.PI + 1) * 180 + t * 30) % 360;
    const wave  = 0.5 + 0.5 * Math.sin(t * 2 + norm * 6);
    const alpha = (0.04 + wave * 0.12) * (1 - Math.min(area / 6000, 1));
    const light = 35 + wave * 25 + pulse * 10;

    ctx.beginPath();
    ctx.moveTo(tri[0].x, tri[0].y);
    ctx.lineTo(tri[1].x, tri[1].y);
    ctx.lineTo(tri[2].x, tri[2].y);
    ctx.closePath();

    ctx.fillStyle   = `hsla(${hue}, 90%, ${light}%, ${alpha})`;
    ctx.strokeStyle = `hsla(${hue}, 100%, ${light + 15}%, ${alpha * 1.8})`;
    ctx.lineWidth   = 0.7;
    ctx.fill();
    ctx.stroke();
  }

  // Glowing nodes
  const hue = (t * 40) % 360;
  for (const p of pts) {
    const r = 2 + pulse * 2;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
    grd.addColorStop(0, `hsla(${hue}, 100%, 90%, 0.9)`);
    grd.addColorStop(1, `hsla(${hue}, 100%, 60%, 0)`);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 4, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }
}

// ─── Background ────────────────────────────────────────────────────────────────
function drawBg(t) {
  // Radial vignette
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const r  = Math.max(canvas.width, canvas.height) * 0.75;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grd.addColorStop(0, 'rgba(5, 8, 30, 1)');
  grd.addColorStop(1, 'rgba(2, 2, 10, 1)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  const grid = 60;
  ctx.strokeStyle = 'rgba(30, 50, 120, 0.07)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += grid) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += grid) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

// ─── PeerJS Connection ────────────────────────────────────────────────────────
const peer = new window.Peer();
let livePose = null;
let lastLiveTime = 0;

peer.on('open', (id) => {
  const mobileUrl = `${window.location.origin}/experiments/screentrace-mobile.html?room=${encodeURIComponent(id)}`;

  new window.QRious({
    element: document.getElementById('qr-code'),
    value: mobileUrl,
    size: 220,
    background: '#ffffff',
    foreground: '#000000',
  });

  document.getElementById('status-text').innerText =
    '1. Scan with your phone\n2. Open the tracking page\n3. Prop up the phone facing you';
});

peer.on('connection', (conn) => {
  document.getElementById('status-text').innerText = 'Secure link established\nReceiving pose map...';
  document.getElementById('qr-code').style.display = 'none';

  setTimeout(() => {
    document.getElementById('overlay').classList.add('hidden');
  }, 1200);

  conn.on('data', (payload) => {
    if (payload && payload.pose) {
      livePose = payload.pose;
      lastLiveTime = Date.now();
    }
  });

  conn.on('close', () => {
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('status-text').innerText = 'Connection lost. Please refresh.';
  });
});

// ─── Main loop ─────────────────────────────────────────────────────────────────
let t = 0;
function loop() {
  requestAnimationFrame(loop);
  t += 0.008;

  drawBg(t);

  let pose;
  if (livePose && (Date.now() - lastLiveTime < 1000)) {
    // If we have live data, use it!
    // Optional smoothing could go here, but MediaPipe has its own smoothing if smoothLandmarks=true
    pose = livePose;
  } else {
    // Fall back to animated pose if disconnected/waiting
    pose = getPose(t);
  }

  // Map to screen coordinates
  const pts = pose.map(lm => toScreen(lm));

  // Triangulate
  const meshTris = delaunay(pts);
  
  if (meshTris.length > 0) {
    const tris = meshTris.map(tri => [
      { ...tri[0], z: pose[pts.indexOf(tri[0])]?.z ?? 0 },
      { ...tri[1], z: pose[pts.indexOf(tri[1])]?.z ?? 0 },
      { ...tri[2], z: pose[pts.indexOf(tri[2])]?.z ?? 0 },
    ]);

    // Render
    switch (mode) {
      case 'mesh':   drawMesh(tris, pts, t);   break;
      case 'edges':  drawEdges(tris, pts, t);  break;
      case 'depth':  drawDepth(tris, pts, t);  break;
      case 'aurora': drawAurora(tris, pts, t); break;
    }
  }
}

loop();
</script>
</body>
</html>
