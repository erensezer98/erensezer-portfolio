<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabletop Scanner Mobile</title>
  <style>
    body {
      margin: 0;
      background: #05070a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    video {
      width: 100vw;
      max-height: 66vh;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.5);
      display: none;
    }
    .container { text-align: center; padding: 20px; width: 100%; box-sizing: border-box; }
    h2 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; font-size: 16px; }
    p { color: #8b929a; font-size: 12px; letter-spacing: 1px; margin-bottom: 24px; line-height: 1.6; }
    #status { color: #95ffb7; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
    button {
      background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: white;
      padding: 16px 32px; font-size: 14px; text-transform: uppercase; letter-spacing: 3px;
      cursor: pointer; border-radius: 2px; font-family: inherit;
    }
    #detected {
      margin-top: 18px; color: rgba(255,255,255,0.82); font-size: 12px; line-height: 1.6; min-height: 40px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="init-container" class="container">
    <h2>Tabletop Scanner</h2>
    <p>Use your phone to scan a desk scene. Books, cups, bottles, laptops and small objects will be translated into city blocks on the desktop.</p>
    <button id="start-btn">Activate Camera</button>
  </div>

  <div id="tracking-container" class="container" style="display: none;">
    <div id="status">Waiting for desktop...</div>
    <video id="preview" autoplay playsinline muted></video>
    <div id="detected"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const roomId = params.get('room')
    const startBtn = document.getElementById('start-btn')
    const statusEl = document.getElementById('status')
    const videoEl = document.getElementById('preview')
    const detectedEl = document.getElementById('detected')

    if (!roomId) {
      startBtn.innerText = 'Invalid connection link'
      startBtn.disabled = true
    }

    async function openBackCamera() {
      return navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 960 },
          height: { ideal: 720 },
        },
        audio: false,
      })
    }

    startBtn.addEventListener('click', async () => {
      document.getElementById('init-container').style.display = 'none'
      document.getElementById('tracking-container').style.display = 'block'
      videoEl.style.display = 'block'
      statusEl.innerText = 'Booting connection...'

      try {
        const stream = await openBackCamera()
        videoEl.srcObject = stream
        await videoEl.play()
      } catch (error) {
        statusEl.innerText = 'Camera denied.'
        return
      }

      const peer = new window.Peer()

      peer.on('open', async () => {
        statusEl.innerText = 'Connecting to desktop...'
        const conn = peer.connect(roomId)

        conn.on('open', async () => {
          statusEl.innerText = 'Loading object detector...'

          await tf.ready()
          const model = await cocoSsd.load({ base: 'lite_mobilenet_v2' })

          statusEl.innerText = 'Scanning tabletop...'

          const interesting = ['book', 'cup', 'bottle', 'cell phone', 'laptop', 'mouse', 'keyboard', 'remote', 'scissors']
          let busy = false

          async function tick() {
            requestAnimationFrame(tick)
            if (busy || videoEl.readyState < 2) return
            busy = true

            try {
              const predictions = await model.detect(videoEl, 12, 0.35)
              const filtered = predictions
                .filter((item) => interesting.includes(item.class))
                .slice(0, 12)
                .map((item) => ({
                  label: item.class,
                  score: item.score,
                  x: item.bbox[0] / videoEl.videoWidth,
                  y: item.bbox[1] / videoEl.videoHeight,
                  width: item.bbox[2] / videoEl.videoWidth,
                  height: item.bbox[3] / videoEl.videoHeight,
                }))

              conn.send({ objects: filtered })
              detectedEl.innerText = filtered.length
                ? `Detected: ${filtered.map((item) => item.label).join(', ')}`
                : 'No tabletop objects recognized yet.'
            } catch (error) {
              detectedEl.innerText = 'Detection paused.'
            }

            busy = false
          }

          tick()
        })

        conn.on('error', () => {
          statusEl.innerText = 'Data stream dropped.'
        })
      })
    })
  </script>
</body>
</html>
